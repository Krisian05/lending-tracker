<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#020617"/>
      <stop offset="22%"  stop-color="#0C1A3A"/>
      <stop offset="55%"  stop-color="#1E3A8A"/>
      <stop offset="82%"  stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="pesoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Glow orb top-right -->
  <circle cx="440" cy="80" r="170" fill="url(#glow1)"/>

  <!-- Glow orb bottom-left -->
  <circle cx="70" cy="430" r="100" fill="rgba(14,165,233,0.12)"/>

  <!-- Peso sign — large, centered, glowing -->
  <text x="258" y="355"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="320" font-weight="900"
        text-anchor="middle"
        fill="url(#pesoGrad)"
        filter="url(#softglow)"
        opacity="0.97">₱</text>
</svg>
