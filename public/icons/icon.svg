<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#020617"/>
      <stop offset="22%"  stop-color="#0C1A3A"/>
      <stop offset="55%"  stop-color="#1E3A8A"/>
      <stop offset="82%"  stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6EE7B7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Glow orb top-right -->
  <circle cx="430" cy="90" r="160" fill="url(#glow1)"/>

  <!-- Bottom-left rotated accent -->
  <rect x="-40" y="390" width="180" height="180" rx="32"
        fill="rgba(14,165,233,0.10)" transform="rotate(28 50 480)"/>

  <!-- Inner card / frosted rect -->
  <rect x="72" y="88" width="368" height="336" rx="48"
        fill="rgba(255,255,255,0.06)"
        stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Peso symbol -->
  <text x="256" y="282"
        font-family="Arial Black, Arial, sans-serif"
        font-size="218" font-weight="900"
        text-anchor="middle"
        fill="white"
        filter="url(#glow)"
        opacity="0.97">₱</text>

  <!-- Chart trend line (bottom of card) -->
  <!-- Area fill -->
  <path d="M108 370 L168 338 L228 352 L300 305 L368 268 L404 252 L404 395 L108 395 Z"
        fill="url(#chartFill)" clip-path="url(#roundClip)"/>
  <!-- Line -->
  <polyline points="108,370 168,338 228,352 300,305 368,268 404,252"
            fill="none" stroke="url(#chartLine)" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="108" cy="370" r="7" fill="#6EE7B7" opacity="0.7"/>
  <circle cx="168" cy="338" r="7" fill="#6EE7B7" opacity="0.7"/>
  <circle cx="228" cy="352" r="7" fill="#6EE7B7" opacity="0.7"/>
  <circle cx="300" cy="305" r="7" fill="#38BDF8"/>
  <circle cx="368" cy="268" r="7" fill="#38BDF8"/>
  <circle cx="404" cy="252" r="9" fill="#38BDF8" filter="url(#glow)"/>

  <!-- "LT" label top-left of card -->
  <text x="108" y="138"
        font-family="Arial, sans-serif"
        font-size="28" font-weight="800"
        fill="rgba(186,230,253,0.45)"
        letter-spacing="3">LENDTRACK</text>
</svg>
