const PAGE_SIZE=8;

function BorrowersList({borrowers,onSelect}){
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');
  const [sortKey,setSortKey]=useState('date');
  const [sortDir,setSortDir]=useState('desc');
  const [page,setPage]=useState(1);
  const list=useMemo(()=>borrowers.map(compute),[borrowers]);

  const filtered=useMemo(()=>{
    let arr=list.filter(b=>{
      const ms=!search||b.name.toLowerCase().includes(search.toLowerCase());
      const mf=filter==='all'?true
        :filter==='active'?(b.status!=='PAID'&&b.status!=='RENEWED')
        :filter==='paid'?b.status==='PAID'
        :b.status==='RENEWED';
      return ms&&mf;
    });
    arr=[...arr].sort((a,b2)=>{
      let va,vb;
      if(sortKey==='name'){va=a.name.toLowerCase();vb=b2.name.toLowerCase();return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}
      if(sortKey==='loan'){va=a.loanAmount;vb=b2.loanAmount}
      else if(sortKey==='balance'){va=Math.max(0,a.bal);vb=Math.max(0,b2.bal)}
      else if(sortKey==='collected'){va=a.tc;vb=b2.tc}
      else if(sortKey==='pct'){va=Math.min(100,Math.round(a.tc/a.tp*100));vb=Math.min(100,Math.round(b2.tc/b2.tp*100))}
      else{va=new Date(a.dateOfRelease);vb=new Date(b2.dateOfRelease)}
      return sortDir==='asc'?va-vb:vb-va;
    });
    return arr;
  },[list,search,filter,sortKey,sortDir]);

  useEffect(()=>setPage(1),[filtered.length,filter,search]);

  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  const paginated=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);

  return(
    <div className="screen">
      {/* ── Thin sticky header bar ── */}
      <div className="ghdr">
        <div className="ghdr-pill">
          <div className="ghdr-pill-left">
            <div className="ghdr-pill-icon">
              {Ico.users(2)}
            </div>
            <span className="ghdr-pill-title">Borrowers</span>
          </div>
          <div className="ghdr-pill-badge">{list.length} Total</div>
        </div>
      </div>

      {/* ── Hero info card ── */}
      <div className="ghdr-hero">
        <div className="ghdr-hero-top">
          <div className="ghdr-hero-left">
            <div className="ghdr-hero-label">Lending Portfolio</div>
            <div className="ghdr-hero-title">Borrowers</div>
            <div className="ghdr-hero-sub">{list.filter(b=>b.status!=='PAID'&&b.status!=='RENEWED').length} active · {list.filter(b=>b.status==='PAID'||b.status==='RENEWED').length} done</div>
          </div>
          <div className="ghdr-hero-badge">{list.filter(b=>b.status==='PAID'||b.status==='RENEWED').length} Done</div>
        </div>
        <div className="ghdr-hero-stats">
          {[
            [String(list.length),'Total'],
            [String(list.filter(b=>b.status!=='PAID'&&b.status!=='RENEWED').length),'Active'],
            [String(list.filter(b=>b.status==='PAID').length),'Paid'],
            [String(list.filter(b=>b.status==='RENEWED').length),'Renewed'],
          ].map(([v,l])=>(
            <div className="ghdr-hero-stat" key={l}>
              <div className="ghdr-hero-stat-val">{v}</div>
              <div className="ghdr-hero-stat-lbl">{l}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="search-wrap">
        <div className="search-box">
          <span className="search-icon">{Ico.search()}</span>
          <input className="search-input" placeholder="Search borrower…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>

      <div className="filters">
        {[['all','All'],['active','Active'],['paid','Paid'],['renewed','Renewed']].map(([v,l])=>(
          <button key={v} className={`filter-btn${filter===v?' on':''}`} onClick={()=>setFilter(v)}>{l}</button>
        ))}
      </div>

      {/* Sort bar */}
      {filtered.length>1&&(
        <div className="sort-bar">
          <span className="sort-lbl">Sort</span>
          <select className="sort-select" value={sortKey} onChange={e=>setSortKey(e.target.value)}>
            <option value="date">Date Released</option>
            <option value="name">Name (A-Z)</option>
            <option value="loan">Loan Amount</option>
            <option value="balance">Balance</option>
            <option value="collected">Collected</option>
            <option value="pct">% Paid</option>
          </select>
          <button className="vtog-btn" style={{background:'rgba(255,255,255,.7)',border:'1.5px solid rgba(29,78,216,.1)',borderRadius:10,padding:'7px 11px'}}
            onClick={()=>setSortDir(d=>d==='asc'?'desc':'asc')}>
            {sortDir==='asc'?'↑':'↓'}
          </button>
        </div>
      )}

      {filtered.length===0?(
        <div className="empty">
          <div className="empty-ico">
            {borrowers.length===0
              ? <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#lg2)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><defs><linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#38BDF8"/><stop offset="100%" stopColor="#1D4ED8"/></linearGradient></defs><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
              : <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#lg3)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><defs><linearGradient id="lg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#38BDF8"/><stop offset="100%" stopColor="#1D4ED8"/></linearGradient></defs><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            }
          </div>
          <div className="empty-title">{borrowers.length===0?'No borrowers yet':'Nothing found'}</div>
          <div className="empty-sub">{borrowers.length===0?'Tap New to create your first borrower record.':'Try adjusting your search or filter.'}</div>
        </div>
      ):(
        <>
          <div className="blist" style={{paddingTop:10}}>
            {paginated.map(b=>{
              const pct=Math.min(100,Math.round(b.tc/b.tp*100));
              const sc=sClass(b.status);
              return(
                <div key={b.id} className={`bcard ${sc}`} onClick={()=>onSelect(b.id)}>
                  <div className="bavatar" style={{background:avatarBg[sc]}}>{ini(b.name)}</div>
                  <div className="binfo">
                    <div className="bname">{b.name}</div>
                    <div className="bmeta">{fmtP(b.loanAmount)} · Due {fmtF(b.dueDate)}</div>
                    <div className="bbadge-row"><Badge status={b.status}/></div>
                  </div>
                  <div className="bright">
                    <div className="bbal">{fmtP(Math.max(0,b.bal))}</div>
                    <div className="bpct">{pct}% paid</div>
                    <div className="pbar">
                      <div className="pbar-f" style={{width:`${pct}%`,background:b.status==='PAID'?'#10B981':b.status==='RENEWED'?'#3B82F6':'linear-gradient(90deg,#6D28D9,#7C3AED)'}}/>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {totalPages>1&&(
            <div className="pager">
              <button className="pager-btn" disabled={page===1} onClick={()=>setPage(p=>p-1)}>‹</button>
              {Array.from({length:totalPages},(_,i)=>i+1).map(p=>(
                <button key={p} className={`pager-btn${page===p?' on':''}`} onClick={()=>setPage(p)}>{p}</button>
              ))}
              <button className="pager-btn" disabled={page===totalPages} onClick={()=>setPage(p=>p+1)}>›</button>
              <span className="pager-info">{(page-1)*PAGE_SIZE+1}–{Math.min(page*PAGE_SIZE,filtered.length)} of {filtered.length}</span>
            </div>
          )}
        </>
      )}
      <div style={{height:16}}/>
    </div>
  );
}

/* ══════════════════════════════
   SCREEN 3 — ADD BORROWER
══════════════════════════════ */
function AddBorrower({onAdd,showToast}){
  const today=new Date().toISOString().slice(0,10);
  const [name,setName]=useState('');
  const [date,setDate]=useState(today);
  const [amt,setAmt]=useState('');
  const [err,setErr]=useState('');
  const loan=parseAmount(amt);
  const payable=!isNaN(loan)&&loan>0?loan*1.2:null;

  function submit(){
    setErr('');
    if(!name.trim()){setErr('Borrower name is required.');return}
    if(isNaN(loan)||loan<=0){setErr('Enter a valid loan amount greater than zero.');return}
    if(!date){setErr('Release date is required.');return}
    onAdd({
      id:uid(),name:name.trim(),
      dateOfRelease:date,
      dueDate:new Date(addDays(date,34)).toISOString().slice(0,10),
      loanAmount:loan,renewAmount:null,
      payments:Array(30).fill(null),loanHistory:[],
    });
    showToast('Borrower added successfully 🎉');
    setName('');setAmt('');setDate(today);
  }

  return(
    <div className="screen">
      <div className="ghdr">
        <div className="ghdr-pill">
          <div className="ghdr-pill-left">
            <div className="ghdr-pill-icon">{Ico.add(2)}</div>
            <span className="ghdr-pill-title">New Borrower</span>
          </div>
          <div className="ghdr-pill-badge">5-6 Scheme</div>
        </div>
      </div>

      <div className="form-page">
        <div className="form-card">
          <div>
            <label className="flabel">Borrower Name *</label>
            <input className="finput" placeholder="e.g. Juan Dela Cruz" value={name} onChange={e=>setName(e.target.value)}/>
          </div>
          <div>
            <label className="flabel">Date of Release *</label>
            <input className="finput" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          </div>
          {date&&(
            <div>
              <label className="flabel">Due Date (auto +34 days)</label>
              <input className="finput" value={fmtF(addDays(date,34))} readOnly/>
            </div>
          )}
          <div>
            <label className="flabel">Loan Amount (₱) *</label>
            <div className="peso-wrap">
              <span className="peso-sym">₱</span>
              <input className="finput" type="text" inputMode="decimal" placeholder="10,000" value={amt} onChange={e=>setAmt(sanitizeAmountInput(e.target.value))}/>
            </div>
          </div>
        </div>

        {payable&&(
          <div className="preview-box">
            <div className="preview-head">📊 5-6 Scheme Preview</div>
            <div className="preview-row"><span>Loan Amount</span><span>{fmtP(loan)}</span></div>
            <div className="preview-sep"/>
            <div className="preview-row"><span>Total Payable (×1.2)</span><span>{fmtP(payable)}</span></div>
            <div className="preview-row"><span>Daily Collection (÷30)</span><span>{fmtP(Math.ceil(payable/30))}/day</span></div>
            <div className="preview-total">
              <span>Your Interest Earned</span>
              <span>+{fmtP(payable-loan)}</span>
            </div>
          </div>
        )}

        {err&&<div className="err-box">⚠️ {err}</div>}
        <button className="btn btn-p" onClick={submit}>Add Borrower</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════
   SCREEN 4 — BORROWER DETAIL
══════════════════════════════ */
function Detail({bid,borrowers,onUpdate,onDelete,onBack,showToast}){
  const raw=borrowers.find(b=>b.id===bid);
  const b=useMemo(()=>raw?compute(raw):null,[raw]);
  const [payModal,setPayModal]=useState(null);
  const [payInput,setPayInput]=useState('');
  const [renewInput,setRenewInput]=useState('');
  const [renewDate,setRenewDate]=useState(new Date().toISOString().slice(0,10));
  const [histModal,setHistModal]=useState(null);
  const [histExpanded,setHistExpanded]=useState(false);
  const [delConfirm,setDelConfirm]=useState(false);
  const inputRef=useRef();

  useEffect(()=>{
    if(payModal!=null){
      setPayInput(b.payments[payModal]!=null?String(b.payments[payModal]):'');
      setTimeout(()=>inputRef.current?.focus(),120);
    }
  },[payModal]);

  useEffect(()=>{
    if(raw)setRenewInput(raw.renewAmount!=null?String(raw.renewAmount):'');
  },[raw?.renewAmount]);

  if(!b)return null;
  const today=t0();
  const pct=Math.min(100,Math.round(b.tc/b.tp*100));
  const sc=sClass(b.status);

  function dColor(i){
    if(b.payments[i]!=null&&b.payments[i]>0)return'dg';
    const d=new Date(b.dates[i]);d.setHours(0,0,0,0);
    return d<=today?'dr':'dn';
  }

  function savePay(){
    const a=parseAmount(payInput);
    if(isNaN(a)||a<0){showToast('Enter a valid amount');return}
    const p=[...b.payments];
    p[payModal]=a===0?null:a;
    onUpdate(b.id,{payments:p});
    setPayModal(null);
    showToast('Payment recorded ✓');
  }

  function clearPay(){
    const p=[...b.payments];
    p[payModal]=null;
    onUpdate(b.id,{payments:p});
    setPayModal(null);
    showToast('Payment cleared');
  }

  function saveRenew(){
    if(!renewInput||renewInput==='0'){onUpdate(b.id,{renewAmount:null});showToast('Renewal removed');return}
    const a=parseAmount(renewInput);
    if(isNaN(a)||a<=0){showToast('Enter a valid renew amount');return}
    if(!renewDate){showToast('Select a new release date');return}
    const testC=compute({...raw,renewAmount:a});
    if(testC.status==='RENEWED'){
      const histEntry={
        loanAmount:raw.loanAmount,
        dateOfRelease:raw.dateOfRelease,
        dueDate:raw.dueDate,
        payments:[...(raw.payments||[])],
        renewedOn:renewDate,
        renewedTo:a,
        tc:b.tc,
        income:raw.loanAmount*0.2,
      };
      onUpdate(b.id,{
        loanAmount:a,
        dateOfRelease:renewDate,
        dueDate:new Date(addDays(renewDate,34)).toISOString().slice(0,10),
        payments:Array(30).fill(null),
        renewAmount:null,
        loanHistory:[...(raw.loanHistory||[]),histEntry],
      });
      showToast('Loan renewed — new cycle started 🔄');
    }else{
      onUpdate(b.id,{renewAmount:a});
      showToast('Renewal saved ✓');
    }
  }

  function handleDelete(){setDelConfirm(true)}

  return(
    <>
    <div className="screen">

      {/* ─ Thin sticky nav bar ─ */}
      <div className="dhdr">
        <div className="dhdr-pill">
          <div className="ghdr-pill-left">
            <div className="ghdr-pill-icon">
              {Ico.users(2)}
            </div>
            <span className="ghdr-pill-title">Borrower Detail</span>
          </div>
          <button className="del-btn" onClick={handleDelete}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 6h18"/>
              <path d="M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2"/>
              <path d="M19 6l-1 13a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            </svg>
          </button>
        </div>
      </div>

      {/* ─ Hero Card ─ */}
      <div className="dhdr-hero">
        <div className="dhdr-hero-top" style={{position:'relative',zIndex:1}}>
          <div className="dhdr-name">{b.name}</div>
          <span className="pct-chip">{pct}%</span>
        </div>
        <div className="dhdr-dates">Released: {fmtF(b.dateOfRelease)} · Due: {fmtF(b.dueDate)}</div>
        <div className="dhdr-badges">
          <Badge status={b.status}/>
        </div>

        {/* Stats row */}
        <div className="qstats">
          <div className="qstat">
            <div className="qstat-lbl">Collected</div>
            <div className="qstat-val g">{fmtP(b.tc)}</div>
          </div>
          <div className="qstat">
            <div className="qstat-lbl">Balance</div>
            <div className={`qstat-val ${b.bal>0?'r':'g'}`}>{fmtP(Math.max(0,b.bal))}</div>
          </div>
          <div className="qstat">
            <div className="qstat-lbl">Can Renew</div>
            <div className="qstat-val y" style={{fontSize:typeof b.prl==='string'?7:12,lineHeight:1.2}}>
              {typeof b.prl==='string'?b.prl:fmtP(b.prl)}
            </div>
          </div>
          <div className="qstat">
            <div className="qstat-lbl">Income</div>
            <div className="qstat-val y">{fmtP(b.income)}</div>
          </div>
        </div>
      </div>

      {/* ─ Loan Info Bar (floating card) ─ */}
      <div className="loan-bar">
        <div className="loan-bar-item">
          <div className="loan-bar-lbl">Loan Amount</div>
          <div className="loan-bar-val" style={{color:'var(--pri2)'}}>{fmtP(b.loanAmount)}</div>
        </div>
        <div className="loan-bar-item">
          <div className="loan-bar-lbl">Total Payable ×1.2</div>
          <div className="loan-bar-val" style={{color:'var(--txt)'}}>{fmtP(b.tp)}</div>
        </div>
        <div className="loan-bar-item">
          <div className="loan-bar-lbl">Progress</div>
          <div className="loan-bar-val" style={{color:'var(--grn)'}}>{pct}%</div>
        </div>
      </div>

      {/* ─ 30-Day Collection Grid ─ */}
      <div className="sec-lbl">30-Day Collection Grid</div>
      <div className="dgrid">
        {Array.from({length:30},(_,i)=>{
          const c=dColor(i);
          const pay=b.payments[i];
          return(
            <div key={i} className={`dcell ${c}`} onClick={()=>setPayModal(i)}>
              <div className="dnum">D{i+1}</div>
              <div className="ddate">{fmtS(b.dates[i])}</div>
              <div className="dpay">{pay!=null&&pay>0?fmtP(pay):c==='dr'?'MISS':'—'}</div>
            </div>
          );
        })}
      </div>

      {/* ─ Loan Renewal — only show when loan is done (paid off or all 30 days passed) ─ */}
      {(()=>{
        const lastDay=new Date(b.dates[29]);lastDay.setHours(0,0,0,0);
        const loanDone=b.bal<=0||today>=lastDay;
        if(!loanDone)return null;
        return(
        <>
      <div className="sec-lbl">Loan Renewal</div>
      <div className="renew-card">
        <div className="renew-card-head">Possible Renew Amount</div>
        <div className="renew-card-amt">
          {typeof b.prl==='string'?b.prl:fmtP(b.prl)}
        </div>

        <div className="renew-row">
          <div className="peso-wrap" style={{flex:1}}>
            <span className="peso-sym">₱</span>
            <input
              className="finput"
              style={{background:'rgba(255,255,255,.75)',border:'1.5px solid #FDE68A'}}
              type="text" inputMode="decimal"
              placeholder="Enter renew amount"
              value={renewInput}
              onChange={e=>setRenewInput(sanitizeAmountInput(e.target.value))}
            />
          </div>
          <button className="btn btn-g btn-sm" onClick={saveRenew}>Save</button>
        </div>

        <div className="renew-date-row">
          <label className="flabel" style={{color:'#92400E'}}>New Release Date</label>
          <input
            className="finput"
            style={{background:'rgba(255,255,255,.75)',border:'1.5px solid #FDE68A'}}
            type="date" value={renewDate}
            onChange={e=>setRenewDate(e.target.value)}
          />
          {renewDate&&<div className="renew-note">New due date: {fmtF(addDays(renewDate,34))}</div>}
        </div>

        {b.renewAmount&&(
          <div className="renew-status-box">
            Current Renewal: <strong>{fmtP(b.renewAmount)}</strong><br/>
            Status: <strong>{b.status}</strong>
          </div>
        )}
      </div>
        </>
        );
      })()}

      {/* ─ Loan History ─ */}
      {raw.loanHistory&&raw.loanHistory.length>0&&(()=>{
        const reversed=[...raw.loanHistory].reverse();
        const LIMIT=3;
        const hasMore=reversed.length>LIMIT;
        const visible=histExpanded?reversed:reversed.slice(0,LIMIT);
        return(
          <>
            {/* Section header */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 14px 10px'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:28,height:28,borderRadius:9,background:'linear-gradient(135deg,#0EA5E9,#1D4ED8)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                </div>
                <span style={{fontSize:13,fontWeight:800,background:'linear-gradient(90deg,var(--pri3),var(--sky))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
                  Loan History
                </span>
              </div>
              <span style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.0)',background:'linear-gradient(135deg,#EFF6FF,#DBEAFE)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',padding:'3px 10px',borderRadius:99,border:'1px solid rgba(29,78,216,.18)',background:'rgba(255,255,255,.85)',color:'#1D4ED8'}}>

            </div>

            <div className="hist-list">
              {visible.map((h,i)=>{
                const cycleNum=raw.loanHistory.length-i;
                return(
                  <div key={i} className="hist-card" onClick={()=>setHistModal(raw.loanHistory.length-1-i)}>

                    {/* Gradient header */}
                    <div className="hist-card-hdr">
                      <div className="hist-card-cycle-wrap">
                        <div className="hist-card-cycle-icon">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(186,230,253,.85)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 100 .49L3.51 15"/></svg>
                        </div>
                        <span className="hist-card-cycle">Cycle {cycleNum}</span>
                      </div>
                      <div className="hist-card-date">
                        Renewed {fmtF(h.renewedOn)} ›
                      </div>
                    </div>

                    {/* Body */}
                    <div className="hist-card-body">
                      {/* 3 stat chips */}
                      <div className="hist-stats">
                        <div className="hist-stat">
                          <div className="hist-stat-lbl">Loan</div>
                          <div className="hist-stat-val" style={{color:'#1D4ED8'}}>{fmtP(h.loanAmount)}</div>
                        </div>
                        <div className="hist-stat">
                          <div className="hist-stat-lbl">Collected</div>
                          <div className="hist-stat-val" style={{color:'#059669'}}>{fmtP(h.tc)}</div>
                        </div>
                        <div className="hist-stat">
                          <div className="hist-stat-lbl">Income</div>
                          <div className="hist-stat-val" style={{color:'#D97706'}}>{fmtP(h.income)}</div>

                      </div>

                      {/* Detail rows */}
                      <div className="hist-row">
                        <span className="hist-row-lbl">
                          <span className="hist-row-lbl-dot" style={{background:'#3B82F6'}}/>

                        </span>
                        <span className="hist-row-val">{fmtF(h.dateOfRelease)}</span>
                      </div>
                      <div className="hist-row">
                        <span className="hist-row-lbl">
                          <span className="hist-row-lbl-dot" style={{background:'#F59E0B'}}/>
                          Due Date
                        </span>
                        <span className="hist-row-val">{fmtF(h.dueDate)}</span>
                      </div>
                      <div className="hist-row">
                        <span className="hist-row-lbl">
                          <span className="hist-row-lbl-dot" style={{background:'#10B981'}}/>
                          Renewed To
                        </span>
                        <span className="hist-row-val" style={{color:'#0EA5E9',fontWeight:900}}>{fmtP(h.renewedTo)}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {hasMore&&(
              <button onClick={()=>setHistExpanded(e=>!e)} style={{
                display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                width:'calc(100% - 28px)',margin:'10px 14px 0',
                padding:'13px',borderRadius:16,
                border:'1.5px solid rgba(29,78,216,.15)',
                background:'rgba(255,255,255,.88)',
                backdropFilter:'blur(12px)',cursor:'pointer',
                fontFamily:'Inter,sans-serif',fontSize:13,fontWeight:700,color:'#1D4ED8',
                boxShadow:'0 2px 10px rgba(29,78,216,.1)',
                transition:'all .18s',
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  {histExpanded?<polyline points="18 15 12 9 6 15"/>:<polyline points="6 9 12 15 18 9"/>}
                </svg>
                {histExpanded?'Show Less':`Show ${reversed.length-LIMIT} More ${reversed.length-LIMIT===1?'Cycle':'Cycles'}`}
              </button>
            )}
          </>
        );
      })()}
      <div style={{height:24}}/>
    </div>

    {/* ─ Payment Modal ─ */}
    {payModal!=null&&(
      <Portal>
        <div className="overlay" onClick={()=>setPayModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>

            {/* Frosted pill top bar — same as page headers */}
            <div className="modal-pill">
              <div className="modal-handle"/>
              <div className="modal-pill-title">Day {payModal+1}</div>
              <div className="modal-pill-badge">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{marginRight:4,verticalAlign:'middle'}}>
                  <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                {fmtF(b.dates[payModal])}
              </div>
            </div>

            {/* Body */}
            <div className="modal-body">
              <div className="modal-sub">Record the payment collected for this day</div>

              {/* Amount input card */}
              <div className="pay-input-wrap">
                <div className="pay-input-lbl">Payment Amount</div>
                <div className="pay-input-row">
                  <span className="pay-currency">₱</span>
                  <input
                    ref={inputRef}
                    className="pay-field"
                    type="text" inputMode="decimal"
                    placeholder="0"
                    value={payInput}
                    onChange={e=>setPayInput(sanitizeAmountInput(e.target.value))}

                  />
                </div>
                <div className="pay-expected">
                  <span>Expected daily</span>
                  <span>{fmtP(Math.ceil(b.tp/30))}/day</span>
                </div>
              </div>

              {/* Actions */}
              <div className="modal-row">
                {b.payments[payModal]!=null&&(
                  <button className="btn" style={{
                    flex:1,background:'rgba(255,255,255,.1)',
                    color:'rgba(186,230,253,.85)',border:'1.5px solid rgba(255,255,255,.15)',
                    borderRadius:14,
                  }} onClick={clearPay}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    Clear
                  </button>
                )}
                <button className="btn" style={{
                  flex:2,
                  background:'linear-gradient(135deg,#38BDF8,#2563EB)',
                  color:'#fff',border:'none',borderRadius:14,
                  boxShadow:'0 6px 22px rgba(14,165,233,.4)',
                  fontSize:15,fontWeight:800,
                }} onClick={savePay}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  Save Payment
                </button>
              </div>
            </div>
          </div>
        </div>
      </Portal>
    )}

    {/* ─ History Modal ─ */}
    {histModal!=null&&raw.loanHistory&&(()=>{
      const h=raw.loanHistory[histModal];
      const hDates=Array.from({length:30},(_,i)=>addDays(h.dateOfRelease,4+i));
      const cycleNum=histModal+1;
      return(
        <Portal>
          <div className="overlay" onClick={()=>setHistModal(null)}>
            <div className="modal" style={{maxHeight:'85vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>

              {/* Pill header */}
              <div className="modal-pill">
                <div className="modal-handle"/>
                <div style={{display:'flex',alignItems:'center',gap:9}}>
                  <div style={{width:30,height:30,borderRadius:9,background:'rgba(255,255,255,.14)',border:'1px solid rgba(255,255,255,.22)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(186,230,253,.85)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 100 .49L3.51 15"/></svg>
                  </div>
                  <span className="modal-pill-title">Loan Cycle {cycleNum}</span>
                </div>
                <div className="modal-pill-badge">Renewed {fmtF(h.renewedOn)}</div>
              </div>

              {/* Body */}
              <div className="modal-body">
                <div className="modal-sub">Released {fmtF(h.dateOfRelease)} · Due {fmtF(h.dueDate)}</div>

                {/* 3 stat chips */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
                  {[['Loan',fmtP(h.loanAmount),'#7DD3FC'],['Collected',fmtP(h.tc),'#6EE7B7'],['Income',fmtP(h.income),'#FCD34D']].map(([l,v,c])=>(
                    <div key={l} style={{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.1)',borderRadius:13,padding:'10px 8px',textAlign:'center'}}>
                      <div style={{fontSize:8,fontWeight:700,color:'rgba(186,230,253,.45)',textTransform:'uppercase',letterSpacing:.5}}>{l}</div>
                      <div style={{fontSize:14,fontWeight:900,color:c,marginTop:4,letterSpacing:'-.3px'}}>{v}</div>
                    </div>
                  ))}
                </div>

                {/* Section label */}
                <div style={{fontSize:9,fontWeight:800,color:'rgba(186,230,253,.4)',textTransform:'uppercase',letterSpacing:'.9px',marginBottom:10}}>
                  30-Day Collection
                </div>

                {/* Day grid */}
                <div className="dgrid" style={{padding:'0 0 4px'}}>
                  {Array.from({length:30},(_,i)=>{
                    const pay=h.payments[i];
                    const hasPay=pay!=null&&pay>0;
                    const dayDate=new Date(hDates[i]);dayDate.setHours(0,0,0,0);
                    const renewedDate=new Date(h.renewedOn);renewedDate.setHours(0,0,0,0);
                    const cls=hasPay?'dg':dayDate<renewedDate?'dr':'dn';
                    return(
                      <div key={i} className={`dcell ${cls}`} style={{cursor:'default'}}>
                        <div className="dnum">D{i+1}</div>
                        <div className="ddate">{fmtS(hDates[i])}</div>
                        <div className="dpay">{hasPay?fmtP(pay):cls==='dr'?'MISS':'—'}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Close button */}
              <div style={{padding:'4px 16px calc(env(safe-area-inset-bottom)+8px)',position:'relative',zIndex:1}}>
                <button className="btn" style={{
                  background:'rgba(255,255,255,.1)',color:'rgba(186,230,253,.85)',
                  border:'1.5px solid rgba(255,255,255,.15)',borderRadius:14,
                }} onClick={()=>setHistModal(null)}>
                  Close
                </button>
              </div>
            </div>
          </div>
        </Portal>
      );
    })()}

    {/* ─ Delete Confirm Modal ─ */}
    {delConfirm&&(
      <Portal>
        <div className="overlay" onClick={()=>setDelConfirm(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            {/* Pill header */}
            <div className="modal-pill">
              <div className="modal-handle"/>
              <div className="modal-pill-title">Delete Record</div>
              <div className="modal-pill-badge" style={{background:'rgba(239,68,68,.2)',border:'1px solid rgba(239,68,68,.35)',color:'#FCA5A5'}}>
                Irreversible
              </div>
            </div>

            {/* Body */}
            <div className="modal-body">
              {/* Icon */}
              <div style={{display:'flex',justifyContent:'center',margin:'6px 0 18px'}}>
                <div style={{
                  width:64,height:64,borderRadius:20,
                  background:'rgba(239,68,68,.15)',
                  border:'1.5px solid rgba(239,68,68,.3)',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  boxShadow:'0 6px 24px rgba(239,68,68,.2)',
                }}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F87171" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 6h18"/>
                    <path d="M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2"/>
                    <path d="M19 6l-1 13a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                  </svg>
                </div>
              </div>

              {/* Text */}
              <div style={{textAlign:'center',marginBottom:22}}>
                <div style={{fontSize:18,fontWeight:900,color:'#fff',letterSpacing:'-.3px',marginBottom:8}}>
                  Delete "{b.name}"?
                </div>
                <div style={{fontSize:13,color:'rgba(186,230,253,.6)',fontWeight:500,lineHeight:1.6}}>
                  All loan records, payment history,<br/>and cycles will be permanently removed.
                </div>
              </div>

              {/* Buttons */}
              <div className="modal-row">
                <button className="btn" style={{
                  flex:1,background:'rgba(255,255,255,.1)',
                  color:'rgba(186,230,253,.85)',border:'1.5px solid rgba(255,255,255,.15)',
                  borderRadius:14,fontSize:14,fontWeight:700,
                }} onClick={()=>setDelConfirm(false)}>
                  Cancel
                </button>
                <button className="btn" style={{
                  flex:1.4,
                  background:'linear-gradient(135deg,#EF4444,#DC2626)',
                  color:'#fff',border:'none',borderRadius:14,
                  fontSize:14,fontWeight:800,
                  boxShadow:'0 6px 22px rgba(220,38,38,.4)',
                }} onClick={()=>{onDelete(b.id);setDelConfirm(false)}}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 6h18"/><path d="M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2"/><path d="M19 6l-1 13a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                  </svg>
                  Delete
                </button>
              </div>
            </div>
          </div>
        </div>
      </Portal>
    )}
    </>
  );
}

/* ══════════════════════════════
   SCREEN 5 — SUMMARY
══════════════════════════════ */
function Summary({borrowers,onClearAll,showToast}){
  const [conf,setConf]=useState(false);
  const list=useMemo(()=>borrowers.map(compute),[borrowers]);
  const t=useMemo(()=>{
    const tp=list.reduce((s,b)=>s+b.tp,0);
    const tc=list.reduce((s,b)=>s+b.tc,0);
    return{
      total:list.length,
      active:list.filter(b=>b.status!=='PAID'&&b.status!=='RENEWED').length,
      paid:list.filter(b=>b.status==='PAID').length,
      renewed:list.filter(b=>b.status==='RENEWED').length,
      lent:list.reduce((s,b)=>s+b.loanAmount,0),
      collected:list.reduce((s,b)=>s+b.tc+(b.loanHistory||[]).reduce((a,h)=>a+h.tc,0),0),
      balance:list.reduce((s,b)=>s+Math.max(0,b.bal),0),
      income:list.reduce((s,b)=>s+b.income,0),
      rate:tp>0?Math.min(100,Math.round(tc/tp*100)):0,
    };
  },[list]);

  function exportData(){
    const lines=[
      '=== LENDTRACK PRO EXPORT ===',
      `Generated: ${new Date().toLocaleString('en-PH')}`,
      '',
      `Total Borrowers: ${t.total} | Active: ${t.active} | Paid: ${t.paid} | Renewed: ${t.renewed}`,
      `Total Lent: ${fmtP(t.lent)} | Collected: ${fmtP(t.collected)} | Balance: ${fmtP(t.balance)}`,
      `Total Income: ${fmtP(t.income)} | Collection Rate: ${t.rate}%`,
      '',
      '--- BORROWER DETAILS ---',
      ...list.map(b=>`${b.name} | Loan: ${fmtP(b.loanAmount)} | Status: ${b.status} | Collected: ${fmtP(b.tc)} | Balance: ${fmtP(Math.max(0,b.bal))} | Income: ${fmtP(b.income)}`),
    ];
    navigator.clipboard.writeText(lines.join('\n'))
      .then(()=>showToast('Copied to clipboard 📋'))
      .catch(()=>showToast('Copy failed'));
  }

  return(
    <div className="screen">
      <div className="ghdr">
        <div className="ghdr-pill">
          <div className="ghdr-pill-left">
            <div className="ghdr-pill-icon">{Ico.chart(2)}</div>
            <span className="ghdr-pill-title">Summary</span>
          </div>
          <div className="ghdr-pill-badge">{borrowers.length} Borrowers</div>
        </div>
      </div>

      <div className="sum-wrap">
        {/* Grand KPI Card */}
        <div className="sum-hero">
          <div className="sum-hero-lbl">Grand Portfolio Summary</div>
          <div className="sum-kpi-grid">
            {[
              ['Total Borrowers',t.total,'#fff'],
              ['Active Loans',t.active,'#93C5FD'],
              ['Total Lent',fmtP(t.lent),'#E0E7FF'],
              ['Collected',fmtP(t.collected),'#6EE7B7'],
              ['Balance Left',fmtP(t.balance),'#FCA5A5'],
              ['Total Income',fmtP(t.income),'#FCD34D'],
            ].map(([l,v,c])=>(
              <div key={l}>
                <div className="sum-kpi-lbl">{l}</div>
                <div className="sum-kpi-val" style={{color:c}}>{v}</div>
              </div>
            ))}
          </div>
          <div className="sum-rate">
            <div className="sum-rate-row">
              <span className="sum-rate-lbl">Overall Collection Rate</span>
              <span className="sum-rate-val">{t.rate}%</span>
            </div>
            <div className="sum-rate-track">
              <div className="sum-rate-fill" style={{width:`${t.rate}%`}}/>
            </div>
          </div>
        </div>

        {/* Collection Chart */}
        {borrowers.length>0&&<IncomeChart borrowers={borrowers} noMargin/>}

        {/* Status Breakdown */}
        <div className="scard">
          <div className="scard-title">Status Breakdown</div>
          {[
            ['NOT YET PAID',list.filter(b=>b.status==='NOT YET PAID').length,'#F59E0B'],
            ['PAID',t.paid,'#10B981'],
            ['RENEWED',t.renewed,'#3B82F6'],
            ['CANNOT RENEW',list.filter(b=>b.status==='CANNOT RENEW').length,'#EF4444'],
          ].map(([l,c,col])=>(
            <div key={l} className="srow">
              <div className="srow-left">
                <div className="sdot" style={{background:col}}/>
                <span className="srow-lbl">{l}</span>
              </div>
              <span className="srow-count" style={{color:col}}>{c}</span>
            </div>
          ))}
        </div>

        {/* Income per Borrower */}
        {list.length>0&&(
          <div className="scard">
            <div className="scard-title">Income per Borrower</div>
            {list.map(b=>(
              <div key={b.id} className="irow">
                <div>
                  <div className="irow-name">{b.name}</div>
                  <div className="irow-status"><Badge status={b.status}/></div>
                </div>
                <div>
                  <div className="irow-val">{fmtP(b.income)}</div>
                  <div className="irow-pct">{Math.min(100,Math.round(b.tc/b.tp*100))}% paid</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Actions */}
        <button className="print-btn" onClick={()=>window.print()}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Report
        </button>
        <button className="act-btn act-export" onClick={exportData}>{Ico.copy()} Export to Clipboard</button>
        <button className="act-btn act-clear" onClick={()=>setConf(true)}>{Ico.trash()} Clear All Data</button>
      </div>

      {/* Clear All Confirm */}
      {conf&&(
        <Portal>
          <div className="overlay" onClick={()=>setConf(false)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              {/* Pill header */}
              <div className="modal-pill">
                <div className="modal-handle"/>
                <div className="modal-pill-title">Clear All Data</div>
                <div className="modal-pill-badge" style={{background:'rgba(239,68,68,.2)',border:'1px solid rgba(239,68,68,.35)',color:'#FCA5A5'}}>
                  Irreversible
                </div>
              </div>

              {/* Body */}
              <div className="modal-body">
                {/* Icon */}
                <div style={{display:'flex',justifyContent:'center',margin:'6px 0 18px'}}>
                  <div style={{width:64,height:64,borderRadius:20,background:'rgba(239,68,68,.15)',border:'1.5px solid rgba(239,68,68,.3)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 6px 24px rgba(239,68,68,.2)'}}>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F87171" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                  </div>
                </div>
                {/* Text */}
                <div style={{textAlign:'center',marginBottom:22}}>
                  <div style={{fontSize:18,fontWeight:900,color:'#fff',letterSpacing:'-.3px',marginBottom:8}}>Delete Everything?</div>
                  <div style={{fontSize:13,color:'rgba(186,230,253,.6)',fontWeight:500,lineHeight:1.6}}>
                    This will permanently delete all borrowers<br/>and payment records. Cannot be undone.
                  </div>
                </div>
                {/* Buttons */}
                <div className="modal-row">
                  <button className="btn" style={{flex:1,background:'rgba(255,255,255,.1)',color:'rgba(186,230,253,.85)',border:'1.5px solid rgba(255,255,255,.15)',borderRadius:14,fontSize:14,fontWeight:700}} onClick={()=>setConf(false)}>
                    Cancel
                  </button>
                  <button className="btn" style={{flex:1.4,background:'linear-gradient(135deg,#EF4444,#DC2626)',color:'#fff',border:'none',borderRadius:14,fontSize:14,fontWeight:800,boxShadow:'0 6px 22px rgba(220,38,38,.4)'}} onClick={()=>{onClearAll();setConf(false);showToast('All data cleared')}}>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M3 6h18"/><path d="M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2"/><path d="M19 6l-1 13a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                    </svg>
                    Clear All
                  </button>
                </div>
              </div>
            </div>
          </div>
        </Portal>
      )}
    </div>
  );
}

/* ══════════════════════════════
   ROOT APP
══════════════════════════════ */
function App(){
  const [borrowers,setBorrowers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('home');
  const [selId,setSelId]=useState(null);
  const [toast,setToast]=useState(null);
  const [installEvent,setInstallEvent]=useState(null);
  const [installDismissed,setInstallDismissed]=useState(false);
  const [installed,setInstalled]=useState(false);
  const [iosHint,setIosHint]=useState(false);
  const tk=useRef(0);

  useEffect(()=>{
    const s=db.get('lendtrack-v2');
    if(s)setBorrowers(s);
    setLoading(false);
  },[]);

  useEffect(()=>{
    if(!loading)db.set('lendtrack-v2',borrowers);
  },[borrowers,loading]);

  useEffect(()=>{
    const ua=navigator.userAgent||'';
    const ios=/iphone|ipad|ipod/i.test(ua);
    const standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
    setIosHint(ios&&!standalone);
    setInstalled(standalone);

    const onBeforeInstallPrompt=e=>{
      e.preventDefault();
      setInstallEvent(e);
    };
    const onInstalled=()=>{
      setInstalled(true);
      setInstallEvent(null);
      setInstallDismissed(false);
      showToast('LendTrack installed');
    };

    window.addEventListener('beforeinstallprompt',onBeforeInstallPrompt);
    window.addEventListener('appinstalled',onInstalled);
    return()=>{
      window.removeEventListener('beforeinstallprompt',onBeforeInstallPrompt);
      window.removeEventListener('appinstalled',onInstalled);
    };
  },[]);

  function showToast(msg){tk.current++;setToast({msg,key:tk.current})}
  const addB=b=>{setBorrowers(p=>[...p,b]);setTab('home')};
  const updB=(id,ch)=>setBorrowers(p=>p.map(b=>b.id===id?{...b,...ch}:b));
  const delB=id=>{setBorrowers(p=>p.filter(b=>b.id!==id));setSelId(null);showToast('Borrower deleted ✓')};
  const clearAll=()=>{setBorrowers([]);db.del('lendtrack-v2')};
  const showInstallCard=!installed&&!installDismissed&&(!!installEvent||iosHint);

  async function handleInstall(){
    if(installEvent){
      installEvent.prompt();
      const choice=await installEvent.userChoice.catch(()=>null);
      setInstallEvent(null);
      if(choice?.outcome!=='accepted')showToast('Install canceled');
      return;
    }
    if(iosHint)showToast('Safari Share > Add to Home Screen');
  }

  if(loading)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh',background:'var(--bg)'}}>
      <div className="spinner"/>
    </div>
  );

  const showDetail=(tab==='home'||tab==='borrowers')&&selId;

  const navItems=[
    {id:'home',label:'Home',icon:w=>Ico.home(w)},
    {id:'borrowers',label:'Borrowers',icon:w=>Ico.users(w)},
    {id:'add',label:'New',icon:w=>Ico.add(w)},
    {id:'summary',label:'Summary',icon:w=>Ico.chart(w)},
  ];

  return(
    <>
      {/* Screen */}
      {showDetail?(
        <Detail bid={selId} borrowers={borrowers} onUpdate={updB} onDelete={delB} onBack={()=>setSelId(null)} showToast={showToast}/>
      ):tab==='home'?(
        <Dashboard borrowers={borrowers} onSelect={id=>setSelId(id)}/>
      ):tab==='borrowers'?(
        <BorrowersList borrowers={borrowers} onSelect={id=>setSelId(id)}/>
      ):tab==='add'?(
        <AddBorrower onAdd={addB} showToast={showToast}/>
      ):(
        <Summary borrowers={borrowers} onClearAll={clearAll} showToast={showToast}/>
      )}

      {showInstallCard&&(
        <div style={{position:'absolute',left:12,right:12,bottom:'calc(env(safe-area-inset-bottom) + 84px)',zIndex:45}}>
          <div style={{background:'rgba(255,255,255,.96)',border:'1.5px solid rgba(29,78,216,.14)',borderRadius:20,padding:'14px 14px 12px',boxShadow:'0 14px 34px rgba(29,78,216,.18),0 2px 8px rgba(0,0,0,.06)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)'}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
              <div>
                <div style={{fontSize:14,fontWeight:900,color:'var(--txt)'}}>Install LendTrack</div>
                <div style={{marginTop:4,fontSize:11.5,lineHeight:1.45,color:'#475569'}}>
                  {installEvent
                    ? 'Install the app for full-screen access from your home screen.'
                    : 'On iPhone or iPad, open Safari, tap Share, then choose Add to Home Screen.'}
                </div>
              </div>
              <button onClick={()=>setInstallDismissed(true)} style={{background:'transparent',border:'none',padding:2,cursor:'pointer',color:'#64748B',fontSize:18,lineHeight:1}}>
                ×
              </button>
            </div>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <button className="btn btn-p" style={{flex:1,minHeight:42,borderRadius:14}} onClick={handleInstall}>
                {installEvent?'Install App':'How to Install'}
              </button>
              <button className="btn" style={{minWidth:74,minHeight:42,borderRadius:14,background:'rgba(255,255,255,.7)',border:'1.5px solid rgba(29,78,216,.12)',color:'var(--txt2)'}} onClick={()=>setInstallDismissed(true)}>
                Later
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Bottom Nav */}
      <nav className="nav">
        <div className="nav-inner">
          {navItems.map(({id,label,icon})=>{
            const active=tab===id&&!showDetail;
            return(
              <button key={id} className={`nav-btn${active?' active':''}`} onClick={()=>{setTab(id);setSelId(null)}}>
                {icon(active?2.5:2)}<span>{label}</span>
              </button>
            );
          })}
        </div>
      </nav>

      {/* Toast */}
      {toast&&<Toast key={toast.key} msg={toast.msg} onDone={()=>setToast(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').then(reg=>reg.update()).catch(()=>{});
  });
}
</script>
</body>
</html>
