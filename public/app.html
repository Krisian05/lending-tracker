<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#1D4ED8"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="LendTrack"/>
<title>LendTrack Pro</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="icon" href="/icons/icon-192.png" sizes="192x192"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,input,select,textarea{touch-action:manipulation}

/* ══ DESIGN TOKENS ══ */
:root{
  --pri:#1D4ED8;--pri2:#1E40AF;--pri3:#2563EB;--pri4:#0C1A3A;
  --sky:#0EA5E9;
  --grn:#059669;--grn2:#10B981;
  --amb:#D97706;--amb2:#F59E0B;
  --red:#DC2626;--red2:#EF4444;
  --bg:#EFF6FF;--bg2:#DBEAFE;--bg3:#BFDBFE;
  --txt:#0C1A3A;--txt2:#1E40AF;--txt3:#2563EB;
  --sh:0 2px 16px rgba(29,78,216,.09),0 1px 4px rgba(0,0,0,.05);
  --sh2:0 16px 48px rgba(29,78,216,.22);
  --grad-app:linear-gradient(175deg,#EFF6FF 0%,#DBEAFE 40%,#E0F2FE 70%,#F0F9FF 100%);
  --grad-hdr:linear-gradient(145deg,#020617 0%,#0C1A3A 20%,#1E3A8A 50%,#1D4ED8 78%,#0EA5E9 100%);
  --grad-card:linear-gradient(135deg,rgba(255,255,255,.96) 0%,rgba(240,249,255,.92) 100%);
}

/* ══ ROOT ══ */
html,body{height:100%;overflow:hidden;background:linear-gradient(160deg,#020617,#0C1A3A,#1E3A8A,#1D4ED8)}
body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
#root{
  display:flex;flex-direction:column;
  width:100%;max-width:430px;margin:0 auto;
  height:100dvh;
  background:var(--grad-app);
  position:relative;overflow:hidden;
}
/* Subtle dot-grid texture overlay */
#root::before{
  content:'';pointer-events:none;
  position:absolute;inset:0;z-index:0;
  background-image:radial-gradient(circle,rgba(29,78,216,.055) 1px,transparent 1px);
  background-size:22px 22px;
}
/* All direct children sit above texture */
#root>*{position:relative;z-index:1}

/* ══ SCROLL CONTAINER ══ */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(env(safe-area-inset-bottom)+90px)}
.screen::-webkit-scrollbar{display:none}

/* ══ BOTTOM NAV ══ */
.nav{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 12px calc(env(safe-area-inset-bottom)+8px);
  z-index:50;
}
.nav-inner{
  display:flex;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1.5px solid rgba(255,255,255,.99);
  border-radius:26px;padding:5px;gap:2px;
  box-shadow:0 10px 40px rgba(29,78,216,.2),0 2px 8px rgba(0,0,0,.07);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;padding:10px 2px;min-height:52px;
  background:none;border:none;cursor:pointer;
  font-size:9.5px;font-weight:600;color:#93C5FD;
  border-radius:20px;transition:all .2s cubic-bezier(.34,1.56,.64,1);letter-spacing:.02px;
  font-family:'Inter',sans-serif;
}
.nav-btn:not(.active):hover{background:rgba(29,78,216,.06);color:#60A5FA;transform:translateY(-1px)}
.nav-btn.active{
  background:linear-gradient(145deg,#0EA5E9,#2563EB,#1D4ED8);
  color:#fff;
  box-shadow:0 6px 24px rgba(29,78,216,.45),0 2px 6px rgba(14,165,233,.3);
  font-weight:800;
  transform:translateY(-1px);
}

/* ══ GRADIENT HEADER (shared — Borrowers / Add / Summary) ══ */
.ghdr{
  background:var(--grad-hdr);
  padding:calc(env(safe-area-inset-top)+14px) 14px 14px;
  position:sticky;top:0;z-index:40;overflow:hidden;
  box-shadow:0 4px 20px rgba(12,26,58,.35);
}
.ghdr::before{
  content:'';position:absolute;top:-60px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.22) 0%,transparent 62%);
  pointer-events:none;
}
/* ── Frosted pill inside header (same as dashboard) ── */
.ghdr-pill{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  border-radius:18px 18px 0 0;
  padding:8px 10px 12px 8px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  position:relative;z-index:1;
}
.ghdr-pill-left{display:flex;align-items:center;gap:10px}
.ghdr-pill-icon{
  width:38px;height:38px;border-radius:11px;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.28);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:#fff;
}
.ghdr-pill-title{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.2px}
.ghdr-pill-badge{
  font-size:11px;font-weight:700;color:rgba(255,255,255,.9);
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.2);
  padding:6px 13px;border-radius:99px;
  white-space:nowrap;
}

/* ── Hero info card below header ── */
.ghdr-hero{
  background:linear-gradient(145deg,#0C1A3A 0%,#1E3A8A 45%,#1D4ED8 80%,#0EA5E9 100%);
  border-radius:24px;padding:16px 18px 16px;
  margin:14px 14px 0;
  position:relative;overflow:hidden;
  box-shadow:0 12px 40px rgba(29,78,216,.38),0 4px 12px rgba(0,0,0,.18);
  border:1px solid rgba(56,189,248,.2);
}
.ghdr-hero::before{
  content:'';position:absolute;top:-50px;right:-40px;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.22) 0%,transparent 62%);pointer-events:none;
}
.ghdr-hero::after{
  content:'';position:absolute;bottom:-32px;left:-20px;width:120px;height:120px;border-radius:20px;
  background:rgba(14,165,233,.1);transform:rotate(28deg);pointer-events:none;
}
.ghdr-hero-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;margin-bottom:14px}
.ghdr-hero-left{display:flex;flex-direction:column}
.ghdr-hero-label{font-size:9px;font-weight:700;color:rgba(186,230,253,.5);text-transform:uppercase;letter-spacing:.9px;margin-bottom:4px}
.ghdr-hero-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.4px}
.ghdr-hero-sub{font-size:11px;color:rgba(186,230,253,.55);font-weight:500;margin-top:3px}
.ghdr-hero-badge{
  font-size:10px;font-weight:700;color:#6EE7B7;
  background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.3);
  padding:5px 13px;border-radius:99px;flex-shrink:0;
}
.ghdr-hero-stats{display:flex;gap:8px;position:relative;z-index:1}
.ghdr-hero-stat{
  flex:1;text-align:center;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.1);
  border-radius:13px;padding:10px 6px 9px;
}
.ghdr-hero-stat-val{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1}
.ghdr-hero-stat-lbl{font-size:8px;font-weight:700;color:rgba(186,230,253,.45);text-transform:uppercase;letter-spacing:.45px;margin-top:4px}

/* keep old classes for Add/Summary which still use simple header */
.ghdr-hdr-row{display:flex;align-items:flex-start;justify-content:space-between;position:relative;z-index:1}
.ghdr-hdr-left{display:flex;flex-direction:column}
.ghdr-simple-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.4px}
.ghdr-simple-sub{font-size:12px;color:rgba(186,230,253,.58);margin-top:4px;font-weight:500}
.ghdr-badge{
  font-size:11px;font-weight:700;color:rgba(255,255,255,.9);
  background:rgba(255,255,255,.12);border:1px solid rgba(56,189,248,.3);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:5px 12px;border-radius:99px;white-space:nowrap;margin-top:2px;
}

/* ══ SECTION LABEL ══ */
.sec-lbl{
  font-size:11px;font-weight:800;
  background:linear-gradient(90deg,var(--pri3),var(--sky));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-transform:uppercase;letter-spacing:.9px;
  padding:20px 16px 9px;
}

/* ══ SEARCH ══ */
.search-wrap{padding:14px 14px 0}
.search-box{position:relative}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#93C5FD;pointer-events:none}
.search-input{
  width:100%;padding:13px 14px 13px 43px;
  border-radius:16px;
  border:1.5px solid rgba(29,78,216,.12);
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  font-size:16px;font-family:'Inter',sans-serif;
  color:var(--txt);outline:none;font-weight:500;
  box-shadow:var(--sh);transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;appearance:none;
}
.search-input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.14),var(--sh)}
.search-input::placeholder{color:#93C5FD}

/* ══ FILTERS ══ */
.filters{display:flex;gap:7px;padding:10px 14px 0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-btn{
  padding:8px 16px;border-radius:99px;font-size:12px;font-weight:700;
  border:1.5px solid rgba(29,78,216,.13);
  background:rgba(255,255,255,.87);
  backdrop-filter:blur(8px);
  color:#3B82F6;cursor:pointer;white-space:nowrap;
  transition:all .2s cubic-bezier(.34,1.3,.64,1);font-family:'Inter',sans-serif;flex-shrink:0;
}
.filter-btn:hover:not(.on){background:rgba(255,255,255,.97);border-color:rgba(29,78,216,.25);transform:translateY(-1px)}
.filter-btn.on{
  background:linear-gradient(135deg,var(--sky),var(--pri3),var(--pri));
  color:#fff;border-color:transparent;
  box-shadow:0 5px 18px rgba(29,78,216,.36);
  transform:translateY(-1px);
}

/* ══ BORROWER LIST ══ */
.blist{display:flex;flex-direction:column;gap:9px;padding:0 14px}
.bcard{
  background:var(--grad-card);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:22px;
  box-shadow:var(--sh);cursor:pointer;
  display:flex;align-items:center;gap:13px;
  padding:14px 14px 14px 12px;
  border:1.5px solid rgba(255,255,255,.97);
  position:relative;overflow:hidden;
  transition:transform .2s cubic-bezier(.34,1.3,.64,1),box-shadow .2s;
}
.bcard:hover{transform:translateY(-2px) scale(1.005);box-shadow:0 10px 36px rgba(29,78,216,.18)}
.bcard:active{transform:scale(.98);box-shadow:var(--sh2)}
.bcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:3px 0 0 3px}
.bcard.sp::before{background:linear-gradient(180deg,#6EE7B7,#10B981,#059669)}
.bcard.sr::before{background:linear-gradient(180deg,#7DD3FC,#38BDF8,#0EA5E9)}
.bcard.sn::before{background:linear-gradient(180deg,#FDE68A,#F59E0B,#D97706)}
.bcard.sc::before{background:linear-gradient(180deg,#FCA5A5,#F87171,#DC2626)}
.bcard.si::before{background:linear-gradient(180deg,#93C5FD,#3B82F6,#1D4ED8)}
.bcard.sp{box-shadow:var(--sh),inset -2px 0 20px rgba(16,185,129,.04)}
.bcard.sr{box-shadow:var(--sh),inset -2px 0 20px rgba(14,165,233,.05)}
.bcard.sn{box-shadow:var(--sh),inset -2px 0 20px rgba(245,158,11,.04)}
.bcard.sc{box-shadow:var(--sh),inset -2px 0 20px rgba(239,68,68,.04)}
.bcard.si{box-shadow:var(--sh),inset -2px 0 20px rgba(59,130,246,.05)}
.bavatar{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:#fff;flex-shrink:0;
  box-shadow:0 4px 14px rgba(0,0,0,.2);
}
.binfo{flex:1;min-width:0}
.bname{font-size:14px;font-weight:800;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bmeta{font-size:11px;color:#94A3B8;margin-top:2px;font-weight:500}
.bbadge-row{margin-top:6px}
.bright{text-align:right;flex-shrink:0}
.bbal{font-size:14px;font-weight:900;color:var(--txt)}
.bpct{font-size:10px;color:#94A3B8;font-weight:600;margin-top:2px}
.pbar{width:54px;height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;margin:5px 0 0 auto}
.pbar-f{height:100%;border-radius:99px;transition:width .6s}

/* ══ BADGE ══ */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px 4px 8px;border-radius:99px;
  font-size:10px;font-weight:700;letter-spacing:.2px;
  font-family:'Inter',sans-serif;
}
.badge svg{width:10px;height:10px;flex-shrink:0}
.bp{background:linear-gradient(135deg,#ECFDF5,#D1FAE5);color:#065F46;border:1px solid rgba(16,185,129,.22)}
.bn{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);color:#92400E;border:1px solid rgba(245,158,11,.22)}
.br{background:linear-gradient(135deg,#F0F9FF,#E0F2FE);color:#075985;border:1px solid rgba(14,165,233,.25)}
.bc{background:linear-gradient(135deg,#FFF5F5,#FEE2E2);color:#991B1B;border:1px solid rgba(239,68,68,.22)}
.bi{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);color:#1E40AF;border:1px solid rgba(29,78,216,.22)}

/* ══ EMPTY STATE ══ */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 30px;text-align:center}
.empty-ico{
  width:80px;height:80px;
  background:linear-gradient(135deg,#EFF6FF,#DBEAFE);
  border-radius:26px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  box-shadow:0 8px 28px rgba(29,78,216,.14);
  border:1.5px solid rgba(255,255,255,.97);
}
.empty-title{font-size:17px;font-weight:800;color:var(--txt)}
.empty-sub{font-size:13px;color:#64748B;margin-top:8px;font-weight:500;line-height:1.6}

/* ══ FORM ══ */
.form-page{padding:14px;display:flex;flex-direction:column;gap:12px}
.form-card{
  background:var(--grad-card);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1.5px solid rgba(255,255,255,.97);
  border-radius:26px;box-shadow:var(--sh);
  padding:20px;display:flex;flex-direction:column;gap:16px;
}
.flabel{font-size:11px;font-weight:700;color:#64748B;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block}
.finput{
  width:100%;padding:14px 15px;border-radius:13px;
  border:1.5px solid rgba(109,40,217,.12);
  background:rgba(248,245,255,.85);
  font-size:16px;font-family:'Inter',sans-serif;color:var(--txt);
  outline:none;font-weight:500;
  transition:border-color .2s,background .2s,box-shadow .2s;
  -webkit-appearance:none;appearance:none;
}
.finput:focus{border-color:var(--sky);background:#fff;box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.finput::placeholder{color:#93C5FD}
.finput[readonly]{background:var(--bg2);color:#1D4ED8;cursor:default;font-weight:700}
.peso-wrap{position:relative}
.peso-sym{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:15px;color:#38BDF8;font-weight:700;pointer-events:none}
.peso-wrap .finput{padding-left:30px}

.preview-box{
  background:linear-gradient(135deg,rgba(255,251,235,.96),rgba(254,243,199,.88));
  border:1.5px solid rgba(253,230,138,.9);
  border-radius:20px;padding:18px;
  backdrop-filter:blur(8px);
}
.preview-head{font-size:11px;font-weight:800;color:#92400E;text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}
.preview-row{display:flex;justify-content:space-between;padding:4px 0}
.preview-row span:first-child{font-size:13px;color:#78350F;font-weight:500}
.preview-row span:last-child{font-size:13px;color:#78350F;font-weight:800}
.preview-sep{height:1px;background:rgba(253,230,138,.7);margin:6px 0}
.preview-total{
  background:rgba(255,255,255,.65);border-radius:12px;
  padding:11px 14px;margin-top:10px;
  display:flex;justify-content:space-between;align-items:center;
}
.preview-total span:first-child{font-size:12px;color:#92400E;font-weight:600}
.preview-total span:last-child{font-size:18px;color:#D97706;font-weight:900}
.err-box{
  background:linear-gradient(135deg,rgba(255,241,242,.95),rgba(254,205,211,.7));
  border:1.5px solid #FECDD3;border-radius:14px;
  padding:13px 15px;font-size:13px;font-weight:600;color:#BE123C;
  display:flex;align-items:center;gap:9px;
}

/* ══ BUTTONS ══ */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:15px;border-radius:14px;border:none;cursor:pointer;
  font-size:15px;font-weight:800;font-family:'Inter',sans-serif;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,opacity .15s;width:100%;
}
.btn:hover{opacity:.92;transform:translateY(-1px)}
.btn:active{transform:scale(.97);opacity:1}
.btn-p{background:linear-gradient(135deg,var(--sky),var(--pri3),var(--pri));color:#fff;box-shadow:0 6px 22px rgba(29,78,216,.38)}
.btn-p:hover{box-shadow:0 10px 32px rgba(29,78,216,.52)}
.btn-g{background:linear-gradient(135deg,var(--grn2),var(--grn));color:#fff;box-shadow:0 6px 18px rgba(5,150,105,.3)}
.btn-g:hover{box-shadow:0 10px 28px rgba(5,150,105,.45)}
.btn-r{background:linear-gradient(135deg,var(--red2),var(--red));color:#fff;box-shadow:0 6px 18px rgba(220,38,38,.3)}
.btn-ghost{background:rgba(29,78,216,.07);color:var(--pri3);font-weight:700;border:1.5px solid rgba(29,78,216,.15)}
.btn-sm{padding:11px 17px;font-size:13px;width:auto;border-radius:11px}

/* ══ DETAIL HEADER ══ */
.dhdr{
  background:var(--grad-hdr);
  padding:calc(env(safe-area-inset-top)+14px) 14px 14px;
  position:sticky;top:0;z-index:40;overflow:hidden;
  box-shadow:0 4px 20px rgba(12,26,58,.35);
}
.dhdr::before{
  content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.22) 0%,transparent 62%);pointer-events:none;
}
.dhdr-pill{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  border-radius:18px 18px 0 0;
  padding:8px 10px 12px 8px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  position:relative;z-index:1;
}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.28);
  color:#fff;cursor:pointer;
  font-size:13px;font-weight:700;font-family:'Inter',sans-serif;
  padding:8px 14px 8px 10px;border-radius:99px;min-height:38px;
  transition:background .15s;
}
.back-btn:active{background:rgba(255,255,255,.28)}
.del-btn{
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.22);
  border-radius:11px;padding:9px;cursor:pointer;
  color:rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center;
  min-width:38px;min-height:38px;
  transition:background .2s,transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,color .2s,border-color .2s;
}
.del-btn:hover{
  background:rgba(239,68,68,.85);
  color:#fff;
  border-color:rgba(239,68,68,.9);
  transform:scale(1.08);
  box-shadow:0 4px 18px rgba(239,68,68,.45);
}
.del-btn:active{
  transform:scale(.93);
  background:#DC2626;
  box-shadow:0 2px 10px rgba(220,38,38,.5);
}

/* ══ DETAIL HERO CARD ══ */
.dhdr-hero{
  background:linear-gradient(145deg,#0C1A3A 0%,#1E3A8A 45%,#1D4ED8 80%,#0EA5E9 100%);
  border-radius:24px;padding:18px 18px 0;
  margin:14px 14px 0;
  position:relative;overflow:hidden;
  box-shadow:0 12px 40px rgba(29,78,216,.38),0 4px 12px rgba(0,0,0,.18);
  border:1px solid rgba(56,189,248,.2);
}
.dhdr-hero::before{
  content:'';position:absolute;top:-50px;right:-40px;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.25) 0%,transparent 62%);pointer-events:none;
}
.dhdr-hero::after{
  content:'';position:absolute;bottom:-32px;left:-20px;width:120px;height:120px;border-radius:20px;
  background:rgba(14,165,233,.1);transform:rotate(28deg);pointer-events:none;
}
.dhdr-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;position:relative;z-index:1}
.dhdr-name{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px}
.dhdr-dates{font-size:11px;color:rgba(186,230,253,.5);font-weight:500;margin-top:3px;margin-bottom:12px;position:relative;z-index:1}
.dhdr-badges{display:flex;align-items:center;gap:8px;margin-bottom:14px;position:relative;z-index:1}
.pct-chip{
  font-size:10px;font-weight:800;color:rgba(255,255,255,.85);
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);
  padding:4px 11px;border-radius:99px;
}

/* ══ QUICK STATS — inside hero card ══ */
.qstats{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid rgba(255,255,255,.1);
  position:relative;z-index:1;margin:0 -18px;
}
.qstat{padding:12px 4px;text-align:center;border-right:1px solid rgba(255,255,255,.08)}
.qstat:last-child{border:none}
.qstat-lbl{font-size:8px;font-weight:700;color:rgba(186,230,253,.48);text-transform:uppercase;letter-spacing:.5px}
.qstat-val{font-size:12px;font-weight:900;margin-top:3px}
.qstat-val.g{color:#6EE7B7}
.qstat-val.r{color:#FCA5A5}
.qstat-val.y{color:#FCD34D}
.qstat-val.w{color:#BAE6FD}

/* ══ LOAN INFO BAR — now a card below hero ══ */
.loan-bar{
  display:flex;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(16px);
  border-radius:20px;
  margin:10px 14px 0;
  border:1.5px solid rgba(255,255,255,.97);
  box-shadow:0 4px 16px rgba(29,78,216,.1);
  overflow:hidden;
}
.loan-bar-item{flex:1;padding:14px 12px;border-right:1px solid rgba(29,78,216,.07)}
.loan-bar-item:last-child{border:none}
.loan-bar-lbl{font-size:9px;font-weight:700;color:#38BDF8;text-transform:uppercase;letter-spacing:.5px}
.loan-bar-val{font-size:15px;font-weight:900;margin-top:4px;letter-spacing:-.3px}

/* ══ DAY GRID ══ */
.dgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:8px 14px 12px}
.dcell{
  border-radius:14px;padding:9px 4px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;transition:transform .12s;
  border:1.5px solid transparent;
}
.dcell:active{transform:scale(.88)}
.dcell.dg{background:linear-gradient(145deg,rgba(209,250,229,.9),rgba(167,243,208,.65));border-color:rgba(52,211,153,.4)}
.dcell.dr{background:linear-gradient(145deg,rgba(254,226,226,.9),rgba(252,165,165,.5));border-color:rgba(248,113,113,.35)}
.dcell.dn{background:rgba(255,255,255,.72);border-color:rgba(109,40,217,.07)}
.dnum{font-size:8px;font-weight:800;color:#94A3B8}
.ddate{font-size:10px;font-weight:700;color:var(--txt)}
.dpay{font-size:9px;font-weight:900;margin-top:1px}
.dcell.dg .dnum{color:#059669}
.dcell.dr .dnum{color:#DC2626}
.dcell.dg .ddate{color:#065F46}
.dcell.dr .ddate{color:#7F1D1D}
.dcell.dg .dpay{color:#059669}
.dcell.dr .dpay{color:#B91C1C}
.dcell.dn .dpay{color:#94A3B8}

/* ══ RENEW SECTION ══ */
.renew-card{
  margin:0 14px 14px;
  background:linear-gradient(135deg,rgba(255,251,235,.96),rgba(254,243,199,.82));
  border:1.5px solid rgba(253,230,138,.85);
  border-radius:20px;padding:17px;
  backdrop-filter:blur(8px);
}
.renew-card-head{font-size:10px;font-weight:800;color:#92400E;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.renew-card-amt{font-size:22px;font-weight:900;color:#78350F;margin-bottom:13px}
.renew-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.renew-date-row{margin-bottom:4px}
.renew-note{font-size:11px;color:#92400E;font-weight:600;margin-top:5px}
.renew-status-box{
  margin-top:10px;padding:9px 13px;
  background:rgba(255,255,255,.65);
  border:1px solid rgba(253,230,138,.6);
  border-radius:11px;font-size:12px;color:#78350F;font-weight:600;line-height:1.6;
}

/* ══ LOAN HISTORY ══ */
.hist-list{display:flex;flex-direction:column;gap:12px;padding:0 14px}
.hist-card{
  border-radius:22px;overflow:hidden;cursor:pointer;
  box-shadow:0 8px 28px rgba(29,78,216,.18),0 2px 8px rgba(0,0,0,.08);
  transition:transform .22s cubic-bezier(.34,1.3,.64,1),box-shadow .22s;
  border:1px solid rgba(56,189,248,.18);
}
.hist-card:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(29,78,216,.28)}
.hist-card:active{transform:scale(.98)}

/* gradient header strip */
.hist-card-hdr{
  background:linear-gradient(135deg,#0C1A3A 0%,#1E3A8A 50%,#1D4ED8 85%,#0EA5E9 100%);
  padding:14px 16px;
  display:flex;justify-content:space-between;align-items:center;
  position:relative;overflow:hidden;
}
.hist-card-hdr::before{
  content:'';position:absolute;top:-30px;right:-20px;width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.22) 0%,transparent 65%);pointer-events:none;
}
.hist-card-cycle-wrap{display:flex;align-items:center;gap:8px}
.hist-card-cycle-icon{
  width:30px;height:30px;border-radius:9px;
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.hist-card-cycle{font-size:13px;font-weight:900;color:#fff;letter-spacing:-.2px}
.hist-card-date{
  font-size:10px;font-weight:700;color:rgba(255,255,255,.85);
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);
  padding:4px 10px;border-radius:99px;white-space:nowrap;
}

/* body */
.hist-card-body{
  background:rgba(255,255,255,.93);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  padding:14px 16px;display:flex;flex-direction:column;gap:0;
}

/* 3 stat boxes row */
.hist-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.hist-stat{
  background:var(--bg);border-radius:13px;
  padding:10px 8px;text-align:center;
  border:1px solid rgba(29,78,216,.07);
}
.hist-stat-lbl{font-size:8px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px}
.hist-stat-val{font-size:14px;font-weight:900;margin-top:4px;letter-spacing:-.3px}

/* detail rows */
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(29,78,216,.055)}
.hist-row:last-child{border:none}
.hist-row-lbl{font-size:12px;color:#64748B;font-weight:500;display:flex;align-items:center;gap:6px}
.hist-row-lbl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.hist-row-val{font-size:13px;font-weight:800;color:var(--txt)}
.hist-divider{height:1px;background:rgba(29,78,216,.07);margin:4px 0}

/* ══ SUMMARY PAGE ══ */
.sum-wrap{padding:14px;display:flex;flex-direction:column;gap:12px}
.sum-hero{
  background:linear-gradient(145deg,#020617 0%,#0C1A3A 18%,#1E3A8A 50%,#1D4ED8 78%,#0EA5E9 100%);
  border-radius:26px;padding:22px;
  box-shadow:0 18px 52px rgba(29,78,216,.5),0 4px 12px rgba(0,0,0,.2);
  position:relative;overflow:hidden;
  border:1px solid rgba(56,189,248,.2);
}
/* glowing circle top-right */
.sum-hero::before{
  content:'';position:absolute;top:-60px;right:-40px;width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.3) 0%,transparent 60%);pointer-events:none;
}
/* rotated rect bottom-left */
.sum-hero::after{
  content:'';position:absolute;bottom:-44px;left:-28px;
  width:160px;height:160px;border-radius:24px;
  background:rgba(14,165,233,.14);
  transform:rotate(28deg);pointer-events:none;
}
.sum-hero-lbl{font-size:10px;font-weight:800;color:rgba(186,230,253,.45);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;position:relative;z-index:1}
.sum-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;position:relative;z-index:1}
.sum-kpi-lbl{font-size:9px;color:rgba(186,230,253,.38);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sum-kpi-val{font-size:20px;font-weight:900;margin-top:4px;letter-spacing:-.4px}
.sum-rate{margin-top:18px;padding-top:15px;border-top:1px solid rgba(255,255,255,.08);position:relative;z-index:1}
.sum-rate-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.sum-rate-lbl{font-size:11px;color:rgba(186,230,253,.4);font-weight:600}
.sum-rate-val{font-size:14px;font-weight:900;color:#6EE7B7}
.sum-rate-track{height:8px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.sum-rate-fill{height:100%;background:linear-gradient(90deg,#059669,#10B981,#6EE7B7);border-radius:99px;transition:width .9s}

.scard{
  background:var(--grad-card);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1.5px solid rgba(255,255,255,.97);
  border-radius:22px;box-shadow:var(--sh);overflow:hidden;
  transition:box-shadow .2s;
}
.scard:hover{box-shadow:0 8px 28px rgba(29,78,216,.14)}
.scard-title{
  padding:15px 17px 11px;font-size:13px;font-weight:800;
  background:linear-gradient(90deg,var(--pri3),var(--sky));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  border-bottom:1px solid rgba(29,78,216,.07);
}
.srow{display:flex;justify-content:space-between;align-items:center;padding:13px 17px;border-bottom:1px solid rgba(29,78,216,.06)}
.srow:last-child{border:none}
.srow-left{display:flex;align-items:center;gap:11px}
.sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.srow-lbl{font-size:13px;font-weight:600;color:var(--txt)}
.srow-count{font-size:18px;font-weight:900}
.irow{display:flex;justify-content:space-between;align-items:center;padding:13px 17px;border-bottom:1px solid rgba(29,78,216,.06)}
.irow:last-child{border:none}
.irow-name{font-size:13px;font-weight:700;color:var(--txt)}
.irow-status{margin-top:4px}
.irow-val{font-size:16px;font-weight:900;text-align:right;background:linear-gradient(135deg,#F59E0B,#D97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.irow-pct{font-size:10px;color:#94A3B8;font-weight:600;text-align:right;margin-top:2px}
.act-btn{
  display:flex;align-items:center;justify-content:center;gap:9px;
  padding:15px;border-radius:15px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;font-family:'Inter',sans-serif;
  transition:transform .15s;width:100%;
}
.act-btn:active{transform:scale(.97)}
.act-export{
  background:rgba(255,255,255,.9);color:var(--txt);
  border:1.5px solid rgba(109,40,217,.15);
  box-shadow:var(--sh);backdrop-filter:blur(12px);
}
.act-clear{
  background:linear-gradient(135deg,rgba(255,241,242,.95),rgba(254,205,211,.75));
  color:#BE123C;border:1.5px solid #FECDD3;
}

/* ══ MODAL ══ */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(4,6,20,.4);
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  animation:overlayIn .22s ease;
}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--grad-hdr);
  border-radius:28px 28px 0 0;
  padding:0 0 calc(env(safe-area-inset-bottom)+24px);
  width:100%;max-width:430px;
  animation:slideUp .32s cubic-bezier(.34,1.2,.64,1);
  box-shadow:0 -16px 60px rgba(12,26,58,.5);
  border-top:1.5px solid rgba(56,189,248,.25);
  position:relative;overflow:hidden;
}
.modal::before{
  content:'';position:absolute;top:-60px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.18) 0%,transparent 65%);
  pointer-events:none;
}
@keyframes slideUp{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}

/* modal top pill — same frosted pill as header */
.modal-pill{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.10);
  border-bottom:1px solid rgba(255,255,255,.1);
  padding:20px 16px 14px;
  position:relative;z-index:1;
}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.22);border-radius:99px;position:absolute;top:10px;left:50%;transform:translateX(-50%)}
.modal-pill-title{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.2px}
.modal-pill-badge{
  font-size:11px;font-weight:700;color:rgba(255,255,255,.85);
  background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);
  padding:5px 12px;border-radius:99px;
  white-space:nowrap;
}

/* modal body */
.modal-body{padding:16px 16px 0;position:relative;z-index:1}
.modal-sub{font-size:11px;color:rgba(186,230,253,.55);font-weight:500;margin-bottom:14px}
.modal-row{display:flex;gap:9px}
.modal-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px}

/* Payment input card */
.pay-input-wrap{
  background:rgba(255,255,255,.08);
  border:1.5px solid rgba(56,189,248,.25);
  border-radius:18px;padding:16px 18px;
  margin-bottom:16px;
}
.pay-input-lbl{font-size:9px;font-weight:800;color:rgba(186,230,253,.5);text-transform:uppercase;letter-spacing:.9px;margin-bottom:12px}
.pay-input-row{display:flex;align-items:center;gap:8px}
.pay-currency{font-size:28px;font-weight:900;color:rgba(56,189,248,.75)}
.pay-field{
  flex:1;background:transparent;border:none;outline:none;
  font-size:36px;font-weight:900;color:#fff;letter-spacing:-.8px;
  font-family:'Inter',sans-serif;width:100%;caret-color:#38BDF8;
}
.pay-field::placeholder{color:rgba(255,255,255,.18)}
.pay-expected{
  font-size:11px;color:rgba(186,230,253,.48);font-weight:600;
  margin-top:12px;padding-top:12px;
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;justify-content:space-between;align-items:center;
}
.pay-expected span:last-child{color:#6EE7B7;font-weight:800;font-size:12px}

/* Day badge */
.modal-day-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(14,165,233,.18);border:1px solid rgba(56,189,248,.28);
  border-radius:99px;padding:5px 12px;margin-bottom:10px;
  font-size:11px;font-weight:700;color:#7DD3FC;
}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,rgba(2,6,23,.95),rgba(12,26,58,.92));
  color:#fff;
  padding:12px 22px;border-radius:99px;
  font-size:13px;font-weight:700;font-family:'Inter',sans-serif;
  z-index:600;white-space:nowrap;
  box-shadow:0 8px 36px rgba(29,78,216,.32),0 2px 8px rgba(0,0,0,.3);
  animation:toastA 3s ease forwards;
  border:1px solid rgba(56,189,248,.22);
}
@keyframes toastA{
  0%{opacity:0;transform:translateX(-50%) translateY(16px)}
  12%{opacity:1;transform:translateX(-50%) translateY(0)}
  78%{opacity:1;transform:translateX(-50%) translateY(0)}
  100%{opacity:0;transform:translateX(-50%) translateY(-10px)}
}
.spinner{
  width:36px;height:36px;
  border:3px solid rgba(29,78,216,.14);
  border-top-color:var(--sky);
  border-radius:50%;animation:spin .7s linear infinite;margin:80px auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ ENTRANCE ANIMATIONS ══ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.dash-hdr{animation:fadeUp .38s ease both}
.dash-alert{animation:fadeUp .4s .12s ease both}
.sec-lbl{animation:fadeUp .4s .15s ease both}
.dash-qlist{animation:fadeUp .44s .18s ease both}

/* ══ INCOME CHART ══ */
.chart-wrap{margin:0 14px 4px}
.chart-card{
  background:var(--grad-card);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1.5px solid rgba(255,255,255,.97);
  border-radius:22px;box-shadow:var(--sh);
  overflow:hidden;
}
.chart-hdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px 10px;
  border-bottom:1px solid rgba(29,78,216,.07);
}
.chart-title{
  font-size:13px;font-weight:800;
  background:linear-gradient(90deg,var(--pri3),var(--sky));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.chart-badge{
  font-size:10px;font-weight:700;
  background:linear-gradient(135deg,#EFF6FF,#DBEAFE);
  color:#1D4ED8;border:1px solid rgba(29,78,216,.18);
  padding:3px 9px;border-radius:99px;
}
.chart-svg-wrap{padding:8px 12px 12px;position:relative}

/* ══ DASHBOARD ══ */
.dash-hdr{
  background:var(--grad-hdr);
  padding:calc(env(safe-area-inset-top)+14px) 14px 14px;
  position:sticky;top:0;z-index:40;overflow:hidden;
  box-shadow:0 4px 20px rgba(12,26,58,.35);
}
.dash-hdr::before{
  content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.22) 0%,transparent 62%);pointer-events:none;
}
.dash-hdr-top{position:relative;z-index:1}

/* ══ HERO CARD — standalone dark card in content area ══ */
.dash-hero-card{
  background:linear-gradient(145deg,#0C1A3A 0%,#1E3A8A 45%,#1D4ED8 80%,#0EA5E9 100%);
  border-radius:24px;padding:18px 18px 16px;
  margin:14px 14px 0;
  position:relative;overflow:hidden;
  box-shadow:0 12px 40px rgba(29,78,216,.38),0 4px 12px rgba(0,0,0,.18);
  border:1px solid rgba(56,189,248,.2);
}
.dash-hero-card::before{
  content:'';position:absolute;top:-50px;right:-40px;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.25) 0%,transparent 62%);pointer-events:none;
}
.dash-hero-card::after{
  content:'';position:absolute;bottom:-36px;left:-24px;width:140px;height:140px;border-radius:22px;
  background:rgba(14,165,233,.12);transform:rotate(28deg);pointer-events:none;
}
/* top row: icon + labels + status badge */
.dash-hero-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;position:relative;z-index:1}
.dash-hero-icon{
  width:44px;height:44px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(56,189,248,.3),rgba(255,255,255,.12));
  border:1.5px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(14,165,233,.2);
}
.dash-hero-meta{flex:1;min-width:0}
.dash-hero-role{font-size:9px;font-weight:700;color:rgba(186,230,253,.5);text-transform:uppercase;letter-spacing:.9px}
.dash-hero-name{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.3px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-hero-badge{
  font-size:10px;font-weight:700;color:#6EE7B7;
  background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.3);
  padding:5px 11px;border-radius:99px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(16,185,129,.18);
}
/* middle: greeting + date */
.dash-hero-greeting{font-size:12px;font-weight:600;color:rgba(186,230,253,.75);margin-bottom:2px;position:relative;z-index:1}
.dash-hero-date{font-size:11px;color:rgba(186,230,253,.42);font-weight:500;margin-bottom:14px;position:relative;z-index:1}
/* bottom: 3 stat boxes */
.dash-hero-stats{display:flex;gap:8px;padding-top:13px;border-top:1px solid rgba(255,255,255,.1);position:relative;z-index:1}
.dash-hero-stat{
  flex:1;text-align:center;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.1);
  border-radius:13px;padding:10px 6px 9px;
}
.dash-hero-stat-val{font-size:17px;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1}
.dash-hero-stat-lbl{font-size:8px;font-weight:700;color:rgba(186,230,253,.45);text-transform:uppercase;letter-spacing:.45px;margin-top:4px}

/* Rate bar — inside hero card */
.dash-rate{margin-top:12px;position:relative;z-index:1}
.dash-rate-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dash-rate-lbl{font-size:10px;color:rgba(186,230,253,.45);font-weight:600}
.dash-rate-val{font-size:11px;font-weight:800;color:#6EE7B7}
.dash-rate-track{height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.dash-rate-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#047857,#10B981,#6EE7B7);transition:width 1s cubic-bezier(.34,1,.64,1)}

/* ══ ALERT CARD (reference: orange overdue style) ══ */
.dash-alert{
  margin:14px 14px 0;
  background:#FFFBF0;
  border:1.5px solid rgba(251,191,36,.4);
  border-radius:18px;padding:13px 14px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 18px rgba(245,158,11,.1);
}
.dash-alert-icon{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,#FEF3C7,#FDE68A);
  border:1px solid rgba(251,191,36,.3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 2px 8px rgba(245,158,11,.18);
}
.dash-alert-text{flex:1;min-width:0}
.dash-alert-title{font-size:13px;font-weight:800;color:#92400E}
.dash-alert-sub{font-size:11px;color:#B45309;font-weight:500;margin-top:2px}
.dash-alert-end{flex-shrink:0;color:#F59E0B}

/* ══ QUICK-ACCESS VERTICAL LIST (reference: white card style) ══ */
.dash-qlist{display:flex;flex-direction:column;gap:9px;padding:0 14px}
.dash-qcard{
  background:#fff;
  border-radius:18px;
  box-shadow:0 2px 14px rgba(29,78,216,.08),0 1px 3px rgba(0,0,0,.04);
  border:1.5px solid rgba(241,245,249,.97);
  display:flex;align-items:center;gap:13px;
  padding:13px 14px 13px 0;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .2s cubic-bezier(.34,1.3,.64,1),box-shadow .2s;
}
.dash-qcard:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(29,78,216,.14)}
.dash-qcard:active{transform:scale(.98)}
/* left colored stripe */
.dash-qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.dash-qcard.sp::before{background:linear-gradient(180deg,#6EE7B7,#059669)}
.dash-qcard.sr::before{background:linear-gradient(180deg,#7DD3FC,#0EA5E9)}
.dash-qcard.sn::before{background:linear-gradient(180deg,#FCD34D,#D97706)}
.dash-qcard.sc::before{background:linear-gradient(180deg,#FCA5A5,#DC2626)}
.dash-qcard.si::before{background:linear-gradient(180deg,#93C5FD,#1D4ED8)}
.dash-qcard-icon{
  width:44px;height:44px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:#fff;
  margin-left:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.18);
}
.dash-qcard-info{flex:1;min-width:0}
.dash-qcard-name{font-size:14px;font-weight:800;color:#0C1A3A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-qcard-meta{font-size:11px;color:#94A3B8;font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-qcard-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;padding-right:4px}
.dash-qcard-amt{font-size:14px;font-weight:900;color:#0C1A3A;letter-spacing:-.2px}
.dash-qcard-chevron{color:#CBD5E1;display:flex;align-items:center}

/* ══ KPI SUMMARY CARDS ══ */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 0}
.kpi-card{
  border-radius:20px;padding:16px 15px;
  position:relative;overflow:hidden;
  transition:transform .22s cubic-bezier(.34,1.3,.64,1),box-shadow .22s;
  cursor:default;border:1.5px solid rgba(255,255,255,.88);
}
.kpi-card:hover{transform:translateY(-3px) scale(1.015)}
.kpi-card::after{content:'';position:absolute;bottom:-22px;right:-22px;width:84px;height:84px;border-radius:50%;background:currentColor;opacity:.09;pointer-events:none}
.kpi-card-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;flex-shrink:0}
.kpi-card-val{font-size:24px;font-weight:900;letter-spacing:-.6px;line-height:1;display:block}
.kpi-card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.65px;margin-top:5px;display:block;opacity:.7}
.kpi-card-sub{font-size:10px;font-weight:600;margin-top:7px;display:flex;align-items:center;gap:4px;opacity:.8}
.kpi-blue{background:linear-gradient(135deg,#EFF6FF 0%,#DBEAFE 100%);color:#1D4ED8;box-shadow:0 6px 22px rgba(29,78,216,.14)}
.kpi-green{background:linear-gradient(135deg,#ECFDF5 0%,#D1FAE5 100%);color:#059669;box-shadow:0 6px 22px rgba(5,150,105,.14)}
.kpi-amber{background:linear-gradient(135deg,#FFFBEB 0%,#FEF3C7 100%);color:#D97706;box-shadow:0 6px 22px rgba(217,119,6,.14)}
.kpi-red{background:linear-gradient(135deg,#FFF5F5 0%,#FEE2E2 100%);color:#DC2626;box-shadow:0 6px 22px rgba(220,38,38,.12)}
.kpi-blue .kpi-card-icon{background:rgba(29,78,216,.12)}
.kpi-green .kpi-card-icon{background:rgba(5,150,105,.12)}
.kpi-amber .kpi-card-icon{background:rgba(217,119,6,.12)}
.kpi-red .kpi-card-icon{background:rgba(220,38,38,.12)}
@keyframes fadeScale{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.kpi-card:nth-child(1){animation:fadeScale .38s .05s ease both}
.kpi-card:nth-child(2){animation:fadeScale .38s .10s ease both}
.kpi-card:nth-child(3){animation:fadeScale .38s .15s ease both}
.kpi-card:nth-child(4){animation:fadeScale .38s .20s ease both}

/* ══ PROFILE AVATAR ══ */
.profile-av{
  width:40px;height:40px;border-radius:13px;
  background:linear-gradient(135deg,rgba(139,92,246,.32),rgba(56,189,248,.26));
  border:1.5px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 3px 12px rgba(56,189,248,.2);
  transition:transform .18s,background .18s;
}
.profile-av:hover{transform:scale(1.08)}
.profile-av:active{transform:scale(.93)}
.profile-av-txt{font-size:15px;font-weight:900;color:#fff;letter-spacing:-.2px;pointer-events:none}

/* ══ VIEW TOGGLE ══ */
.view-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0}
.view-bar-left{font-size:11px;font-weight:700;color:#64748B}
.view-toggle{display:flex;gap:4px;background:rgba(255,255,255,.7);border:1.5px solid rgba(29,78,216,.1);border-radius:12px;padding:3px}
.vtog-btn{
  padding:6px 12px;border-radius:9px;font-size:11px;font-weight:700;
  border:none;background:transparent;color:#64748B;
  cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .18s cubic-bezier(.34,1.3,.64,1);
}
.vtog-btn.on{background:linear-gradient(135deg,var(--sky),var(--pri3));color:#fff;box-shadow:0 3px 10px rgba(29,78,216,.28)}

/* ══ SORT BAR ══ */
.sort-bar{display:flex;gap:7px;padding:8px 14px 0;align-items:center}
.sort-lbl{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}
.sort-select{
  flex:1;padding:8px 12px;border-radius:10px;
  border:1.5px solid rgba(29,78,216,.12);
  background:rgba(255,255,255,.9);
  font-size:12px;font-family:'Inter',sans-serif;font-weight:600;color:var(--txt);
  outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;
  transition:border-color .2s,box-shadow .2s;
}
.sort-select:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.1)}

/* ══ TABLE VIEW ══ */
.tbl-outer{padding:0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(29,78,216,.2) transparent}
.tbl-outer::-webkit-scrollbar{height:4px}
.tbl-outer::-webkit-scrollbar-thumb{background:rgba(29,78,216,.25);border-radius:99px}
.tbl-outer::-webkit-scrollbar-track{background:rgba(29,78,216,.06);border-radius:99px}
.tbl-shell{background:rgba(255,255,255,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:18px;border:1.5px solid rgba(255,255,255,.97);box-shadow:var(--sh);min-width:600px}
.tbl{width:100%;border-collapse:collapse;min-width:480px}
.tbl thead{background:linear-gradient(135deg,#0F172A,#1E3A8A,#1D4ED8)}
.tbl thead th{
  padding:11px 13px;font-size:9.5px;font-weight:800;text-transform:uppercase;
  letter-spacing:.65px;color:rgba(255,255,255,.8);white-space:nowrap;
  cursor:pointer;border:none;user-select:none;
  transition:background .15s;
}
.tbl thead th:hover{background:rgba(255,255,255,.1)}
.tbl thead th.sorted{color:#7DD3FC}
.tbl-sort-ico{display:inline-block;margin-left:4px;opacity:.55;font-size:9px;font-style:normal}
.tbl thead th.sorted .tbl-sort-ico{opacity:1}
.tbl tbody tr{cursor:pointer;transition:background .12s}
.tbl tbody tr:hover{background:rgba(219,234,254,.7)}
.tbl tbody tr:nth-child(even){background:rgba(241,245,249,.55)}
.tbl tbody tr:nth-child(even):hover{background:rgba(219,234,254,.7)}
.tbl tbody td{
  padding:11px 13px;font-size:12px;font-weight:600;color:var(--txt);
  border-bottom:1px solid rgba(29,78,216,.055);white-space:nowrap;
}
.tbl tbody td:first-child{font-weight:800;font-size:13px}
.tbl tbody tr:last-child td{border-bottom:none}

/* ══ PAGINATION ══ */
.pager{display:flex;align-items:center;justify-content:center;gap:5px;padding:12px 14px 4px}
.pager-btn{
  width:34px;height:34px;border-radius:10px;
  border:1.5px solid rgba(29,78,216,.12);
  background:rgba(255,255,255,.87);color:#3B82F6;
  font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
  transition:all .18s cubic-bezier(.34,1.3,.64,1);
}
.pager-btn:hover:not(:disabled):not(.on){background:#fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(29,78,216,.14)}
.pager-btn.on{background:linear-gradient(135deg,var(--sky),var(--pri));color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(29,78,216,.3)}
.pager-btn:disabled{opacity:.3;cursor:default;pointer-events:none}
.pager-info{font-size:11px;color:#94A3B8;font-weight:600;padding:0 6px}

/* ══ PRINT BUTTON ══ */
.print-btn{
  display:flex;align-items:center;justify-content:center;gap:9px;
  padding:14px;border-radius:14px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.09));
  color:#6D28D9;border:1.5px solid rgba(109,40,217,.2);
  transition:all .18s;width:100%;
}
.print-btn:hover{background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(139,92,246,.16));transform:translateY(-1px)}
.print-btn:active{transform:scale(.97)}

/* ══ PRINT MEDIA ══ */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body,html{background:white!important;overflow:visible!important}
  #root{max-width:100%!important;height:auto!important;overflow:visible!important;background:white!important}
  .nav,.toast,.overlay,.modal,.print-btn,.act-clear{display:none!important}
  .screen{overflow:visible!important;padding-bottom:20px!important}
  .ghdr,.dash-hdr{background:linear-gradient(135deg,#0F172A,#1E3A8A,#1D4ED8)!important}
  .sum-hero{background:linear-gradient(135deg,#0F172A,#1D4ED8)!important}
  .scard,.kpi-card{break-inside:avoid}
}

/* ══ LANDSCAPE MODE ══ */
@media (orientation:landscape){
  /* Full-width layout, no portrait cap */
  #root{
    max-width:100%;
    flex-direction:row;
  }

  /* Side nav replaces bottom nav */
  .nav{
    position:relative;
    bottom:auto;left:auto;right:auto;
    width:76px;flex-shrink:0;
    height:100dvh;
    padding:calc(env(safe-area-inset-top)+12px) 8px calc(env(safe-area-inset-bottom)+12px);
    display:flex;align-items:stretch;
    border-right:1px solid rgba(56,189,248,.14);
    background:linear-gradient(180deg,#020617,#0C1A3A,#1E3A8A,#1D4ED8,#0EA5E9);
  }
  .nav-inner{
    flex-direction:column;
    width:100%;
    border-radius:18px;
    padding:6px;gap:4px;
    justify-content:flex-start;
  }
  .nav-btn{
    flex:none;
    padding:11px 6px;
    border-radius:14px;
    font-size:9px;
  }

  /* Screen fills remaining space */
  .screen{
    flex:1;
    padding-bottom:0;
    padding-right:env(safe-area-inset-right);
  }

  /* Compact headers */
  .ghdr{
    padding:calc(env(safe-area-inset-top)+10px) 16px 14px;
  }
  .dhdr{
    padding:calc(env(safe-area-inset-top)+10px) 12px 10px;
  }
  .dhdr-hero{margin:10px 12px 0}

  /* Day grid — more columns */
  .dgrid{grid-template-columns:repeat(10,1fr);gap:5px;padding:6px 12px 10px}

  /* Renew card */
  .renew-card{margin:0 12px 12px}

  /* Summary kpi grid */
  .sum-kpi-grid{grid-template-columns:repeat(3,1fr)}
  .sum-kpi-val{font-size:16px}
  .sum-wrap{padding:10px;gap:10px}

  /* KPI cards landscape */
  .kpi-grid{grid-template-columns:repeat(4,1fr);padding:10px 12px 0}
  .kpi-card-val{font-size:18px}
  .kpi-card{padding:13px 12px}

  /* Compact modals in landscape */
  .modal{border-radius:20px 20px 0 0;padding:16px 18px calc(env(safe-area-inset-bottom)+20px)}
  .modal-title{font-size:17px}

  /* Toast position */
  .toast{bottom:20px}

  /* Section label */
  .sec-lbl{padding:14px 14px 7px}

  /* Borrower card compact */
  .bcard{padding:11px 12px 11px 10px}
  .bavatar{width:40px;height:40px;border-radius:12px;font-size:13px}
  .bname{font-size:13px}

  /* Dashboard compact in landscape */
  .dash-hdr{padding:calc(env(safe-area-inset-top)+10px) 14px 10px}
  .dash-hero-card{margin:10px 12px 0}
  .dash-rate{margin-top:8px}
  .dash-hero-stats{gap:6px}
  .dash-hero-stat{padding:8px 4px 7px}
  .dash-hero-stat-val{font-size:14px}
  .dash-qlist{padding:0 12px}
  .dash-alert{margin:10px 12px 0}
}

/* Small phone (iPhone SE, etc) — compact dash header */
@media (max-height:667px) and (orientation:portrait){
  .dash-hdr{padding:calc(env(safe-area-inset-top)+10px) 14px 10px}
  .dash-hero-card{margin:10px 12px 0;padding:14px 14px 12px}
  .dash-hero-stat-val{font-size:14px}
  .dash-rate{margin-top:8px}
}

/* Wide landscape (tablet) */
@media (orientation:landscape) and (min-width:900px){
  .nav{width:90px}
  .nav-btn{font-size:10px}
  .dgrid{grid-template-columns:repeat(10,1fr)}
  .sum-kpi-grid{grid-template-columns:repeat(3,1fr)}
}

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

/* ── Storage ── */
const db={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del:k=>{try{localStorage.removeItem(k)}catch{}},
};

/* ── Utils ── */
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const fmtS=d=>{if(!d)return'—';const x=new Date(d);return`${x.getMonth()+1}/${x.getDate()}`};
const fmtF=d=>{if(!d)return'—';return new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})};
const fmtP=n=>{if(n==null)return'₱0';return'₱'+Number(n).toLocaleString('en-PH',{minimumFractionDigits:0,maximumFractionDigits:0})};
const t0=()=>{const d=new Date();d.setHours(0,0,0,0);return d};
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const todayStr=()=>new Date().toLocaleDateString('en-PH',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
const sanitizeAmountInput=v=>{
  const s=String(v??'').replace(/,/g,'').replace(/[^\d.]/g,'');
  const dot=s.indexOf('.');
  return dot===-1?s:s.slice(0,dot+1)+s.slice(dot+1).replace(/\./g,'');
};
const parseAmount=v=>parseFloat(String(v??'').replace(/,/g,''));

/* ── Business Logic ── */
function compute(b){
  const payments=b.payments||Array(30).fill(null);
  const tc=payments.reduce((s,p)=>s+(p||0),0);
  const tp=b.loanAmount*1.2;
  const bal=tp-tc;
  let prl;
  if(tc===0)prl='NO PAYMENTS YET';
  else if(bal<=0)prl=b.loanAmount;
  else{const s=b.loanAmount-Math.max(0,bal);prl=s>0?s:0}
  let status;
  const ra=b.renewAmount;
  if(ra&&ra>0){
    if(tc===0||(typeof prl==='number'&&prl===0))status='CANNOT RENEW';
    else if(typeof prl==='number'&&ra>prl)status=`INVALID - MAX ${fmtP(prl)}`;
    else status='RENEWED';
  }else if(bal<=0)status='PAID';
  else status='NOT YET PAID';
  let income=0;
  if(status==='RENEWED')income=b.loanAmount*0.2;
  else if(tc>b.loanAmount)income=Math.min(tc-b.loanAmount,b.loanAmount*0.2);
  income+=(b.loanHistory||[]).reduce((s,h)=>s+(h.income||0),0);
  const dates=Array.from({length:30},(_,i)=>addDays(b.dateOfRelease,4+i));
  return{...b,payments,tc,tp,bal,prl,status,income,dates};
}

function sClass(s){
  if(s==='PAID')return'sp';
  if(s==='RENEWED')return'sr';
  if(s==='CANNOT RENEW')return'sc';
  if(s&&s.startsWith('INVALID'))return'si';
  return'sn';
}

const avatarBg={
  sp:'linear-gradient(135deg,#059669,#10B981)',
  sr:'linear-gradient(135deg,#0EA5E9,#38BDF8)',
  sn:'linear-gradient(135deg,#1D4ED8,#2563EB)',
  sc:'linear-gradient(135deg,#DC2626,#F87171)',
  si:'linear-gradient(135deg,#1E40AF,#3B82F6)',
};

/* ── SVG Icons ── */
const Ico={
  home:(w=2)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={w} strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg>,

  users:(w=2)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={w} strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,

/* ── Badge ── */
function Badge({status}){
  let cls='bn',icon=<>{Ico.clock()}</>;
  if(status==='PAID'){cls='bp';icon=<>{Ico.check()}</>}
  else if(status==='RENEWED'){cls='br';icon=<>{Ico.refresh()}</>}
  else if(status==='CANNOT RENEW'){cls='bc';icon=<>{Ico.x()}</>}
  else if(status?.startsWith('INVALID')){cls='bi';icon=<>{Ico.warn()}</>}
  return <span className={`badge ${cls}`}>{icon} {status}</span>;
}

}

/* ── Income Chart (Monthly / Yearly) ── */
function IncomeChart({borrowers,noMargin}){
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  /* Build month-keyed income map from all borrowers */
  const {points,totalIncome,multiYear}=useMemo(()=>{
    const map={}; // key: "YYYY-MM", val: income

    const addIncome=(dateStr,income)=>{
      if(!dateStr||!income)return;
      const d=new Date(dateStr);
      if(isNaN(d))return;
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      map[k]=(map[k]||0)+income;
    };

    borrowers.forEach(b=>{
      /* Completed / renewed historical cycles — income locked in on renewedOn date */
      (b.loanHistory||[]).forEach(h=>{
        addIncome(h.renewedOn, h.income||0);
      });

      /* Current active cycle — partial income earned so far, attributed to today */
      const cb=compute(b);
      const histIncome=(b.loanHistory||[]).reduce((s,h)=>s+(h.income||0),0);
      const currentIncome=cb.income-histIncome;
      if(currentIncome>0){
        addIncome(new Date().toISOString().slice(0,10), currentIncome);
      }
    });

    if(Object.keys(map).length===0)return{points:[],totalIncome:0,multiYear:false};

    /* Sort keys chronologically */
    const keys=Object.keys(map).sort();
    const firstYear=parseInt(keys[0].split('-')[0]);
    const lastYear=parseInt(keys[keys.length-1].split('-')[0]);
    const multiYear=lastYear>firstYear;

    /* Fill every month between first and last key (no gaps) */
    const filled=[];
    const start=new Date(keys[0]+'-01');
    const end=new Date(keys[keys.length-1]+'-01');
    const cur=new Date(start);
    while(cur<=end){
      const k=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
      filled.push({key:k,val:map[k]||0,yr:cur.getFullYear(),mo:cur.getMonth()});
      cur.setMonth(cur.getMonth()+1);
    }

    const totalIncome=Object.values(map).reduce((s,v)=>s+v,0);
    return{points:filled,totalIncome,multiYear};
  },[borrowers]);

  const hasData=points.length>0&&points.some(p=>p.val>0);

  /* Chart geometry */
  const W=320,H=148,PL=40,PR=10,PT=12,PB=32;
  const cW=W-PL-PR,cH=H-PT-PB;

  const niceCeil=v=>{
    if(v<=0)return 1000;
    const mag=Math.pow(10,Math.floor(Math.log10(v)));
    const nice=[1,2,2.5,5,10];
    for(const n of nice)if(Math.ceil(v/(n*mag))*n*mag>=v)return Math.ceil(v/(n*mag))*n*mag;
    return Math.ceil(v/mag)*mag;
  };

  const yMax=hasData?niceCeil(Math.max(...points.map(p=>p.val))):1000;
  const n=points.length;
  const xOf=i=>PL+(n===1?cW/2:i/(n-1)*cW);
  const yOf=v=>PT+cH-(v/yMax)*cH;

  const pts=points.map((p,i)=>({x:xOf(i),y:yOf(p.val),v:p.val,key:p.key,yr:p.yr,mo:p.mo}));

  function smoothPath(ps){
    if(ps.length<2)return'';
    let d=`M${ps[0].x},${ps[0].y}`;
    for(let i=1;i<ps.length;i++){
      const a=ps[i-1],b=ps[i];
      const cpx=(a.x+b.x)/2;
      d+=` C${cpx},${a.y} ${cpx},${b.y} ${b.x},${b.y}`;
    }
    return d;
  }

  const linePath=n>=2?smoothPath(pts):'';
  const lastPt=pts[pts.length-1];
  const firstPt=pts[0];
  const areaPath=n>=2
    ?linePath+` L${lastPt.x},${PT+cH} L${firstPt.x},${PT+cH} Z`
    :'';

  const yTicks=[0,1,2,3,4].map(i=>({val:Math.round(yMax/4*i),y:yOf(yMax/4*i)}));

  /* X-axis: pick up to 6 evenly spaced labels */
  const maxLabels=Math.min(6,n);
  const step=n<=1?1:Math.ceil((n-1)/(maxLabels-1));
  const xLabels=[];
  for(let i=0;i<n;i+=step)xLabels.push(pts[i]);
  if(n>1&&xLabels[xLabels.length-1]!==pts[n-1])xLabels.push(pts[n-1]);

  const fmtXLabel=p=>{
    if(multiYear)return`${MONTHS[p.mo].slice(0,3)} '${String(p.yr).slice(2)}`;
    return MONTHS[p.mo];
  };
  const fmtY=v=>v>=1000?`${(v/1000).toFixed(v%1000===0?0:1)}k`:v;

  if(!hasData){
    return(
      <div className="chart-wrap" style={noMargin?{margin:0}:{}}>
        <div className="chart-card">
          <div className="chart-hdr">
            <span className="chart-title">Income Over Time</span>
            <span className="chart-badge">No data yet</span>
          </div>
          <div style={{textAlign:'center',padding:'32px 0',fontSize:12,color:'#93C5FD',fontWeight:600}}>
            Complete or renew a loan to see income history
          </div>
        </div>
      </div>
    );
  }

  return(
    <div className="chart-wrap" style={noMargin?{margin:0}:{}}>
      <div className="chart-card">
        <div className="chart-hdr">
          <span className="chart-title">Income Over Time</span>
          <span className="chart-badge">Total {fmtP(totalIncome)}</span>
        </div>

        {/* Tab row — month / year toggle hint (visual only, data auto-scales) */}
        <div style={{display:'flex',gap:6,padding:'6px 14px 0',fontSize:10,fontWeight:700}}>
          <span style={{color:'#1D4ED8',background:'#EFF6FF',border:'1px solid #BFDBFE',padding:'3px 10px',borderRadius:99}}>
            {multiYear?'Monthly by Year':'Monthly'}
          </span>
          <span style={{color:'#64748B',padding:'3px 6px'}}>
            {points.length} {points.length===1?'month':'months'} of data
          </span>
        </div>

        <div className="chart-svg-wrap">
          <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block',overflow:'visible'}}>
            <defs>
              <linearGradient id="igFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#0EA5E9" stopOpacity=".35"/>
                <stop offset="70%" stopColor="#38BDF8" stopOpacity=".07"/>
                <stop offset="100%" stopColor="#0EA5E9" stopOpacity="0"/>
              </linearGradient>
              <filter id="igShadow" x="-20%" y="-30%" width="140%" height="160%">
                <feDropShadow dx="0" dy="2" stdDeviation="3.5" floodColor="#0EA5E9" floodOpacity=".38"/>
              </filter>
            </defs>

            {/* Horizontal grid lines */}
            {yTicks.map((t,i)=>(
              <g key={i}>
                <line x1={PL} y1={t.y} x2={W-PR} y2={t.y}
                  stroke={i===0?'rgba(29,78,216,.15)':'rgba(29,78,216,.07)'}
                  strokeWidth={i===0?1.2:.7}
                  strokeDasharray={i===0?'0':'4 3'}/>
                <text x={PL-4} y={t.y+3.5} textAnchor="end"
                  fontSize="7.5" fontFamily="Inter,sans-serif" fontWeight="700" fill="#64748B">
                  {fmtY(t.val)}
                </text>
              </g>
            ))}

            {/* Area fill */}
            {n>=2&&<path d={areaPath} fill="url(#igFill)"/>}

            {/* Line */}
            {n>=2&&(
              <path d={linePath} fill="none" stroke="#0EA5E9" strokeWidth="2.4"
                strokeLinejoin="round" strokeLinecap="round" filter="url(#igShadow)"/>
            )}

            {/* Dots — all months */}
            {pts.map((p,i)=>(
              <g key={i}>
                {p.v>0&&<circle cx={p.x} cy={p.y} r="5" fill="#0EA5E9" opacity=".18"/>}
                <circle cx={p.x} cy={p.y} r={p.v>0?3:2}
                  fill={p.v>0?'#0EA5E9':'#CBD5E1'}
                  stroke="#fff" strokeWidth="1.5"/>
              </g>
            ))}

            {/* Value labels on top of each dot (only if few points) */}
            {n<=8&&pts.map((p,i)=>p.v>0&&(
              <text key={i} x={p.x} y={p.y-8} textAnchor="middle"
                fontSize="7" fontFamily="Inter,sans-serif" fontWeight="800" fill="#1D4ED8">
                {fmtP(p.v)}
              </text>
            ))}

            {/* X-axis labels */}
            {xLabels.map((p,i)=>(
              <text key={i} x={p.x} y={H-6} textAnchor="middle"
                fontSize="7.5" fontFamily="Inter,sans-serif" fontWeight="700" fill="#64748B">
                {fmtXLabel(p)}
              </text>
            ))}

            {/* Axes */}
            <line x1={PL} y1={PT} x2={PL} y2={PT+cH} stroke="rgba(29,78,216,.14)" strokeWidth="1"/>
            <line x1={PL} y1={PT+cH} x2={W-PR} y2={PT+cH} stroke="rgba(29,78,216,.14)" strokeWidth="1"/>
          </svg>
        </div>
      </div>
    </div>
  );
}

function useClock(){
  const [time,setTime]=useState(()=>{
    const n=new Date();
    return n.toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit',hour12:true});
  });
  useEffect(()=>{
    const id=setInterval(()=>{
      const n=new Date();
      setTime(n.toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit',hour12:true}));
    },1000);
    return()=>clearInterval(id);
  },[]);
  return time;
}
